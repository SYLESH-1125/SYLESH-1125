name: Skyline & City Visuals

# Mirrors AbdullahBakir97/AbdullahBakir97's metrics.yml pipeline:
#   1. city-screenshots — lowlighter/metrics plugin_skyline screenshots the
#      real honzaap.github.io/GithubCity visualizer per year and commits the
#      SVG to the metrics-output branch.
#   2. stl-skylines — github/gh-skyline CLI builds a real 3D-printable .stl
#      per year from the contributions GraphQL API, committed to the same
#      branch, viewable in GitHub's native 3D viewer.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  setup-years:
    runs-on: ubuntu-latest
    outputs:
      years: ${{ steps.compute.outputs.years }}
    env:
      START_YEAR: "2024"
    steps:
      - id: compute
        run: |
          current=$(date +%Y)
          years=$(python3 -c "import json; print(json.dumps([str(y) for y in range(${START_YEAR}, ${current}+1)]))")
          echo "Years to render: $years"
          echo "years=$years" >> "$GITHUB_OUTPUT"

  city-screenshots:
    needs: setup-years
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        year: ${{ fromJSON(needs.setup-years.outputs.years) }}
    steps:
      - uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: SYLESH-1125
          template: classic
          filename: github-metrics-city-${{ matrix.year }}.svg
          base: ""
          plugin_skyline: yes
          plugin_skyline_year: ${{ matrix.year }}
          plugin_skyline_frames: 60
          plugin_skyline_quality: 0.8
          plugin_skyline_settings: |
            {
              "url": "https://honzaap.github.io/GithubCity?name=${login}&year=${year}",
              "ready": "[...document.querySelectorAll('.display-info span')].map(span => span.innerText).includes('${login}')",
              "wait": 8,
              "hide": ".github-corner, .footer-link, .buttons-options, .mobile-rotate, .display-info span:first-child"
            }
          committer_branch: metrics-output
          committer_message: "Update city ${{ matrix.year }}"
          output_action: commit

  stl-skylines:
    needs: [setup-years, city-screenshots]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        year: ${{ fromJSON(needs.setup-years.outputs.years) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: metrics-output
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gh-skyline extension
        run: gh extension install github/gh-skyline

      - name: Generate STL for ${{ matrix.year }}
        run: gh skyline --user ${{ github.repository_owner }} --year ${{ matrix.year }} --output skyline-${{ matrix.year }}.stl

      - name: Commit STL if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skyline-${{ matrix.year }}.stl
          if git diff --cached --quiet; then
            echo "no STL changes for ${{ matrix.year }}"
          else
            git commit -m "Update STL skyline ${{ matrix.year }}"
            git pull --rebase origin metrics-output
            git push
          fi
