name: Generate Snake Animation

on:
  # Run automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Regenerate on every push to the default branch
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-snake:
    runs-on: ubuntu-latest
    name: Render contribution snake
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#F5E36A&color_dots=#161B22,#3a3000,#7a6500,#bda400,#F5E36A
            dist/github-contribution-grid-snake.svg?color_snake=#F5E36A&color_dots=#ebedf0,#f4e8a8,#f0dd7a,#ecd24c,#F5E36A

      - name: Push snake assets to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
