<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 420" width="360" height="420" fill="none" role="img" aria-label="3× National Hackathon Winner — golden trophy">
  <defs>
    <linearGradient id="trophyCup" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7A5A1E"/>
      <stop offset="22%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F3E6C4"/>
      <stop offset="78%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#7A5A1E"/>
    </linearGradient>
    <linearGradient id="trophyBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAD9A0"/>
      <stop offset="100%" stop-color="#8A6A28"/>
    </linearGradient>
    <filter id="trophyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cupClip">
      <path d="M104 48 H256 V96 a76 76 0 0 1 -152 0 Z"/>
    </clipPath>
  </defs>
  <ellipse cx="180" cy="398" rx="100" ry="14" fill="#D4AF37" opacity="0.22"/>
  <g filter="url(#trophyGlow)">
    <!-- base plate -->
    <path d="M118 352 H242 L252 388 H108 Z" fill="url(#trophyBase)" stroke="#6B5220" stroke-width="1.2"/>
    <rect x="138" y="334" width="84" height="20" rx="4" fill="url(#trophyBase)" stroke="#6B5220" stroke-width="0.8"/>
    <!-- stem — flush to cup and base -->
    <rect x="168" y="268" width="24" height="68" rx="2" fill="url(#trophyCup)"/>
    <!-- handles -->
    <path d="M104 58 C48 64 48 138 112 138" fill="none" stroke="url(#trophyCup)" stroke-width="14" stroke-linecap="round"/>
    <path d="M256 58 C312 64 312 138 248 138" fill="none" stroke="url(#trophyCup)" stroke-width="14" stroke-linecap="round"/>
    <!-- cup bowl -->
    <path d="M104 48 H256 V96 a76 76 0 0 1 -152 0 Z" fill="url(#trophyCup)" stroke="#6B5220" stroke-width="1.5"/>
    <!-- rim -->
    <rect x="96" y="36" width="168" height="18" rx="9" fill="url(#trophyBase)" stroke="#6B5220" stroke-width="1"/>
    <text x="180" y="108" text-anchor="middle" font-family="Segoe UI,Inter,sans-serif" font-size="34" font-weight="800" fill="#2A2010">3×</text>
    <text x="180" y="318" text-anchor="middle" font-family="Segoe UI,Inter,sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#EAD9A0">WINNER</text>
    <g clip-path="url(#cupClip)">
      <rect x="70" y="20" width="40" height="140" fill="#FFFFFF" opacity="0.45" transform="rotate(18 0 0)">
        <animate attributeName="x" values="50;290;50" dur="3.5s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g fill="#F3E6C4">
      <path d="M300 42 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 Z">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M58 92 l2.5 6 6 2.5 -6 2.5 -2.5 6 -2.5 -6 -6 -2.5 6 -2.5 Z">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>