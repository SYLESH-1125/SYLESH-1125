    <text x="28" y="66" font-size="13" font-weight="700" fill="#8A8A8F">Agentic Statistical Report Generation System</text>
    <text x="28" y="92" font-size="12.5" fill="#B8B8BC">bharatstat Ś multi-agent RAG for government</text>
    <text x="28" y="110" font-size="12.5" fill="#B8B8BC">statistical reports: survey ingestion, Z-score / IQR</text>
    <text x="28" y="128" font-size="12.5" fill="#B8B8BC">validation, and BERT-backed report generation.</text>
    <g font-size="10.5" font-weight="700" fill="#141210">
