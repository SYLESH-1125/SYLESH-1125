      <rect x="82" y="146" width="86" height="24" rx="12" fill="#D4AF37"/><text x="125" y="162" text-anchor="middle">LangChain</text>
      <rect x="174" y="146" width="52" height="24" rx="12" fill="#D4AF37"/><text x="200" y="162" text-anchor="middle">LLMs</text>
      <rect x="232" y="146" width="54" height="24" rx="12" fill="#D4AF37"/><text x="259" y="162" text-anchor="middle">BERT</text>
    </g>
    <line x1="28" y1="182" x2="432" y2="182" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="28" y="208" font-size="12" font-weight="700" fill="#E8A33D">HIGHLIGHT</text>
    <text x="28" y="230" font-size="12.5" fill="#F2F1EC">Statistical-deviation-free government reporting.</text>
    <text x="28" y="256" font-size="11" font-weight="700" fill="#8A8A8F">github.com/SYLESH-1125/bharatstat</text>
  </g>

  <!-- Card 4: EDUMITE -->
  <g transform="translate(500,320)">
    <rect width="470" height="280" rx="18" fill="url(#fpBg)" stroke="#2A2410" stroke-width="1.2" filter="url(#fpShadow)"/>
    <rect x="0" y="0" width="470" height="6" rx="3" fill="url(#fpStrip)"/>
    <text x="28" y="44" font-size="19" font-weight="800" fill="#F2F1EC">EDUMITE</text>
    <text x="28" y="66" font-size="13" font-weight="700" fill="#8A8A8F">Adaptive AI Tutoring &amp; Cognitive Analytics</text>
    <text x="28" y="92" font-size="12.5" fill="#B8B8BC">SYLEDUTECH / EDUMITE Ś AI tutoring, 3D sign-language</text>
    <text x="28" y="110" font-size="12.5" fill="#B8B8BC">avatars, Gemini-powered study paths, gamified learning,</text>
    <text x="28" y="128" font-size="12.5" fill="#B8B8BC">and 30+ integrated features for accessible education.</text>
    <g font-size="10.5" font-weight="700" fill="#141210">
      <rect x="28" y="146" width="54" height="24" rx="12" fill="#D4AF37"/><text x="55" y="162" text-anchor="middle">LLMs</text>
      <rect x="88" y="146" width="50" height="24" rx="12" fill="#D4AF37"/><text x="113" y="162" text-anchor="middle">NLP</text>
      <rect x="144" y="146" width="62" height="24" rx="12" fill="#D4AF37"/><text x="175" y="162" text-anchor="middle">Python</text>
      <rect x="212" y="146" width="66" height="24" rx="12" fill="#D4AF37"/><text x="245" y="162" text-anchor="middle">Three.js</text>
    </g>
    <line x1="28" y1="182" x2="442" y2="182" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="28" y="208" font-size="12" font-weight="700" fill="#E8A33D">HIGHLIGHT</text>
    <text x="28" y="230" font-size="12.5" fill="#F2F1EC">850+ ISL signs Ę Gemini tutor Ę WCAG AA certified.</text>
    <text x="28" y="256" font-size="11" font-weight="700" fill="#8A8A8F">github.com/SYLESH-1125/SYLEDUTECH</text>
  </g>
</svg>
