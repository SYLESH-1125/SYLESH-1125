<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 620" width="990" height="620" fill="none" role="img" aria-label="Four premium project cards: Cryptographically Enforced AI Forensic Intelligence Platform, CrimeGPT AI Legal Intelligence and Case Management, ASI-Gen Agentic Statistical Report Generation System, EDUMITE Adaptive AI Tutoring">
  <defs>
    <linearGradient id="fpBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17171A"/>
      <stop offset="100%" stop-color="#0F0F11"/>
    </linearGradient>
    <linearGradient id="fpStrip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8A6A28"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="fpShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <style>text{font-family:'Segoe UI',Arial,sans-serif}</style>

  <rect width="990" height="620" fill="#0A0A0B"/>

  <!-- Card 1: Forensic Platform -->
  <g transform="translate(20,20)">
    <rect width="460" height="280" rx="18" fill="url(#fpBg)" stroke="#2A2410" stroke-width="1.2" filter="url(#fpShadow)"/>
    <rect x="0" y="0" width="460" height="6" rx="3" fill="url(#fpStrip)"/>
    <text x="28" y="40" font-size="17" font-weight="800" fill="#F2F1EC">Cryptographically Enforced AI</text>
    <text x="28" y="62" font-size="17" font-weight="800" fill="#F2F1EC">Forensic Intelligence Platform</text>
    <text x="28" y="86" font-size="12.5" fill="#B8B8BC">Automates the threat lifecycle with JIT tokens,</text>
    <text x="28" y="104" font-size="12.5" fill="#B8B8BC">Parquet + DuckDB analytics, Drain3 + Isolation</text>
    <text x="28" y="122" font-size="12.5" fill="#B8B8BC">Forest anomaly detection and SHAP explainability.</text>
    <g font-size="10.5" font-weight="700" fill="#141210">
      <rect x="28" y="140" width="60" height="24" rx="12" fill="#D4AF37"/><text x="58" y="156" text-anchor="middle">Python</text>
      <rect x="94" y="140" width="62" height="24" rx="12" fill="#D4AF37"/><text x="125" y="156" text-anchor="middle">DuckDB</text>
      <rect x="162" y="140" width="66" height="24" rx="12" fill="#D4AF37"/><text x="195" y="156" text-anchor="middle">OpenCV</text>
      <rect x="234" y="140" width="60" height="24" rx="12" fill="#D4AF37"/><text x="264" y="156" text-anchor="middle">GenAI</text>
    </g>
    <line x1="28" y1="182" x2="432" y2="182" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="28" y="208" font-size="12" font-weight="700" fill="#E8A33D">HIGHLIGHT</text>
    <text x="28" y="230" font-size="12.5" fill="#F2F1EC">GDPR-compliant cryptographic data shredding.</text>
    <text x="28" y="256" font-size="11" font-weight="700" fill="#8A8A8F">github.com/SYLESH-1125/csic-backend</text>
  </g>

  <!-- Card 2: CrimeGPT -->
  <g transform="translate(500,20)">
    <rect width="470" height="280" rx="18" fill="url(#fpBg)" stroke="#2A2410" stroke-width="1.2" filter="url(#fpShadow)"/>
    <rect x="0" y="0" width="470" height="6" rx="3" fill="url(#fpStrip)"/>
    <text x="28" y="44" font-size="19" font-weight="800" fill="#F2F1EC">CrimeGPT</text>
    <text x="28" y="66" font-size="13" font-weight="700" fill="#8A8A8F">AI Legal Intelligence &amp; Case Management</text>
    <text x="28" y="92" font-size="12.5" fill="#B8B8BC">Grounded RAG + OCR + LLMs auto-generate 11</text>
    <text x="28" y="110" font-size="12.5" fill="#B8B8BC">statutory documents with an immutable,</text>
    <text x="28" y="128" font-size="12.5" fill="#B8B8BC">event-sourced, cryptographically verified audit trail.</text>
    <g font-size="10.5" font-weight="700" fill="#141210">
      <rect x="28" y="146" width="70" height="24" rx="12" fill="#D4AF37"/><text x="63" y="162" text-anchor="middle">FastAPI</text>
      <rect x="104" y="146" width="76" height="24" rx="12" fill="#D4AF37"/><text x="142" y="162" text-anchor="middle">pgvector</text>
      <rect x="186" y="146" width="54" height="24" rx="12" fill="#D4AF37"/><text x="213" y="162" text-anchor="middle">OCR</text>
      <rect x="246" y="146" width="52" height="24" rx="12" fill="#D4AF37"/><text x="272" y="162" text-anchor="middle">LLMs</text>
    </g>
    <line x1="28" y1="188" x2="442" y2="188" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="28" y="212" font-size="12" font-weight="700" fill="#E8A33D">HIGHLIGHT</text>
    <text x="28" y="234" font-size="12.5" fill="#F2F1EC">AI-driven legal reasoning with cryptographic proof.</text>
    <text x="28" y="258" font-size="11" font-weight="700" fill="#8A8A8F">github.com/SYLESH-1125/CRIMEGPT</text>
  </g>

  <!-- Card 3: ASI-Gen -->
  <g transform="translate(20,320)">
    <rect width="460" height="280" rx="18" fill="url(#fpBg)" stroke="#2A2410" stroke-width="1.2" filter="url(#fpShadow)"/>
    <rect x="0" y="0" width="460" height="6" rx="3" fill="url(#fpStrip)"/>
    <text x="28" y="44" font-size="19" font-weight="800" fill="#F2F1EC">ASI-Gen</text>
    <text x="28" y="66" font-size="13" font-weight="700" fill="#8A8A8F">Agentic Statistical Report Generation System</text>
    <text x="28" y="92" font-size="12.5" fill="#B8B8BC">Multi-agent RAG pipeline processes large-scale</text>
    <text x="28" y="110" font-size="12.5" fill="#B8B8BC">surveys and auto-generates government statistical</text>
    <text x="28" y="128" font-size="12.5" fill="#B8B8BC">reports with Z-score / IQR + BERT validation.</text>
    <g font-size="10.5" font-weight="700" fill="#141210">
      <rect x="28" y="146" width="48" height="24" rx="12" fill="#D4AF37"/><text x="52" y="162" text-anchor="middle">RAG</text>
      <rect x="82" y="146" width="86" height="24" rx="12" fill="#D4AF37"/><text x="125" y="162" text-anchor="middle">LangChain</text>
      <rect x="174" y="146" width="52" height="24" rx="12" fill="#D4AF37"/><text x="200" y="162" text-anchor="middle">LLMs</text>
      <rect x="232" y="146" width="54" height="24" rx="12" fill="#D4AF37"/><text x="259" y="162" text-anchor="middle">BERT</text>
    </g>
    <line x1="28" y1="182" x2="432" y2="182" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="28" y="208" font-size="12" font-weight="700" fill="#E8A33D">HIGHLIGHT</text>
    <text x="28" y="230" font-size="12.5" fill="#F2F1EC">Statistical-deviation-free government reporting.</text>
    <text x="28" y="256" font-size="11" font-weight="700" fill="#8A8A8F">github.com/SYLESH-1125?tab=repositories</text>
  </g>

  <!-- Card 4: EDUMITE -->
  <g transform="translate(500,320)">
    <rect width="470" height="280" rx="18" fill="url(#fpBg)" stroke="#2A2410" stroke-width="1.2" filter="url(#fpShadow)"/>
    <rect x="0" y="0" width="470" height="6" rx="3" fill="url(#fpStrip)"/>
    <text x="28" y="44" font-size="19" font-weight="800" fill="#F2F1EC">EDUMITE</text>
    <text x="28" y="66" font-size="13" font-weight="700" fill="#8A8A8F">Adaptive AI Tutoring &amp; Cognitive Analytics</text>
    <text x="28" y="92" font-size="12.5" fill="#B8B8BC">LLM tutor with NLP intent detection and behavioral</text>
    <text x="28" y="110" font-size="12.5" fill="#B8B8BC">analytics that spots weak concepts and personalizes</text>
    <text x="28" y="128" font-size="12.5" fill="#B8B8BC">study paths with probabilistic recommendation models.</text>
    <g font-size="10.5" font-weight="700" fill="#141210">
      <rect x="28" y="146" width="54" height="24" rx="12" fill="#D4AF37"/><text x="55" y="162" text-anchor="middle">LLMs</text>
      <rect x="88" y="146" width="50" height="24" rx="12" fill="#D4AF37"/><text x="113" y="162" text-anchor="middle">NLP</text>
      <rect x="144" y="146" width="62" height="24" rx="12" fill="#D4AF37"/><text x="175" y="162" text-anchor="middle">Python</text>
      <rect x="212" y="146" width="66" height="24" rx="12" fill="#D4AF37"/><text x="245" y="162" text-anchor="middle">Three.js</text>
    </g>
    <line x1="28" y1="182" x2="442" y2="182" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="28" y="208" font-size="12" font-weight="700" fill="#E8A33D">HIGHLIGHT</text>
    <text x="28" y="230" font-size="12.5" fill="#F2F1EC">Probabilistic recommendation engine per learner.</text>
    <text x="28" y="256" font-size="11" font-weight="700" fill="#8A8A8F">github.com/SYLESH-1125/SYLEDUTECH</text>
  </g>
</svg>
