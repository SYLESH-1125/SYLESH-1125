<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260" fill="none" role="img" aria-label="Sylesh Pavendan, Full-Stack Developer and AI/ML Engineer, premium hero banner">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </linearGradient>
    <linearGradient id="heroText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EAD9A0"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#E8A33D"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <style>
    text{font-family:'Segoe UI',Arial,sans-serif}
    .accent{animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.65}50%{opacity:1}}
  </style>

  <rect x="0" y="0" width="1000" height="260" rx="24" fill="url(#heroBg)" stroke="#2A2410" stroke-width="1" filter="url(#softShadow)"/>

  <g stroke="#D4AF37" stroke-opacity="0.06">
    <line x1="0" y1="60" x2="1000" y2="60"/>
    <line x1="0" y1="200" x2="1000" y2="200"/>
  </g>

  <circle class="accent" cx="944" cy="40" r="5" fill="#FF6B35"/>
  <text x="924" y="44" text-anchor="end" font-size="11" font-weight="700" letter-spacing="2" fill="#8A8A8F">AVAILABLE</text>

  <text x="60" y="120" font-size="52" font-weight="800" fill="url(#heroText)">Sylesh Pavendan</text>
  <text x="61" y="160" font-size="20" font-weight="600" fill="#F2F1EC">Full-Stack Developer &#183; AI/ML Engineer</text>
  <text x="61" y="192" font-size="14" fill="#8A8A8F">Team Lead @ DYNAMITE &#8212; 3&#215; National Hackathon Winner &#183; LeetCode Knight</text>

  <rect x="60" y="216" width="230" height="1.4" fill="#D4AF37" opacity="0.5"/>
</svg>
