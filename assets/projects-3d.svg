<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" width="1000" height="430" fill="none" role="img" aria-label="3D project showcase cards">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161D29"/>
      <stop offset="100%" stop-color="#0A0E15"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B5220"/>
      <stop offset="100%" stop-color="#473809"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EAD9A0"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8901F"/>
    </linearGradient>
    <clipPath id="clip1"><rect x="60" y="46" width="400" height="150" rx="16"/></clipPath>
    <clipPath id="clip2"><rect x="540" y="46" width="400" height="150" rx="16"/></clipPath>
    <clipPath id="clip3"><rect x="60" y="250" width="400" height="150" rx="16"/></clipPath>
    <clipPath id="clip4"><rect x="540" y="250" width="400" height="150" rx="16"/></clipPath>
  </defs>

  <!-- ===== CARD 1 ===== -->
  <ellipse cx="270" cy="214" rx="180" ry="13" fill="#000000" opacity="0.30"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0" dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <rect x="70" y="58" width="400" height="150" rx="16" fill="url(#edge)"/>
    <rect x="60" y="46" width="400" height="150" rx="16" fill="url(#glass)" stroke="url(#goldH)" stroke-width="1.5"/>
    <rect x="72" y="76" width="4" height="92" rx="2" fill="url(#goldH)"/>
    <circle cx="110" cy="92" r="19" fill="#0D1117" stroke="url(#goldH)" stroke-width="1.5"/>
    <text x="110" y="99" text-anchor="middle" font-family="'Fira Code',monospace" font-size="17" font-weight="800" fill="#D4AF37">01</text>
    <text x="150" y="90" font-family="'Segoe UI',Arial,sans-serif" font-size="21" font-weight="800" fill="#D4AF37">Forensic AI Platform</text>
    <text x="150" y="116" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#9AA4B2">Crypto-enforced threat lifecycle · DuckDB · SHAP</text>
    <g font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="600" fill="#D4AF37">
      <rect x="150" y="150" width="62" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="181" y="165" text-anchor="middle">Python</text>
      <rect x="220" y="150" width="64" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="252" y="165" text-anchor="middle">DuckDB</text>
      <rect x="292" y="150" width="52" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="318" y="165" text-anchor="middle">SHAP</text>
    </g>
    <g clip-path="url(#clip1)">
      <rect x="0" y="20" width="40" height="220" fill="#FFFFFF" opacity="0.07" transform="rotate(18 0 0)">
        <animate attributeName="x" values="20;460;20" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ===== CARD 2 ===== -->
  <ellipse cx="750" cy="214" rx="180" ry="13" fill="#000000" opacity="0.30"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0" dur="5s" begin="0.6s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <rect x="550" y="58" width="400" height="150" rx="16" fill="url(#edge)"/>
    <rect x="540" y="46" width="400" height="150" rx="16" fill="url(#glass)" stroke="url(#goldH)" stroke-width="1.5"/>
    <rect x="552" y="76" width="4" height="92" rx="2" fill="url(#goldH)"/>
    <circle cx="590" cy="92" r="19" fill="#0D1117" stroke="url(#goldH)" stroke-width="1.5"/>
    <text x="590" y="99" text-anchor="middle" font-family="'Fira Code',monospace" font-size="17" font-weight="800" fill="#D4AF37">02</text>
    <text x="630" y="90" font-family="'Segoe UI',Arial,sans-serif" font-size="21" font-weight="800" fill="#D4AF37">Patient–Doctor Portal</text>
    <text x="630" y="116" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#9AA4B2">Agentic healthcare workflows · GenAI dashboards</text>
    <g font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="600" fill="#D4AF37">
      <rect x="630" y="150" width="64" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="662" y="165" text-anchor="middle">Next.js</text>
      <rect x="702" y="150" width="62" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="733" y="165" text-anchor="middle">GenAI</text>
      <rect x="772" y="150" width="70" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="807" y="165" text-anchor="middle">Firebase</text>
    </g>
    <g clip-path="url(#clip2)">
      <rect x="480" y="20" width="40" height="220" fill="#FFFFFF" opacity="0.07" transform="rotate(18 0 0)">
        <animate attributeName="x" values="500;940;500" dur="4s" begin="0.6s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ===== CARD 3 ===== -->
  <ellipse cx="270" cy="418" rx="180" ry="13" fill="#000000" opacity="0.30"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0" dur="5s" begin="1.2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <rect x="70" y="262" width="400" height="150" rx="16" fill="url(#edge)"/>
    <rect x="60" y="250" width="400" height="150" rx="16" fill="url(#glass)" stroke="url(#goldH)" stroke-width="1.5"/>
    <rect x="72" y="280" width="4" height="92" rx="2" fill="url(#goldH)"/>
    <circle cx="110" cy="296" r="19" fill="#0D1117" stroke="url(#goldH)" stroke-width="1.5"/>
    <text x="110" y="303" text-anchor="middle" font-family="'Fira Code',monospace" font-size="17" font-weight="800" fill="#D4AF37">03</text>
    <text x="150" y="294" font-family="'Segoe UI',Arial,sans-serif" font-size="21" font-weight="800" fill="#D4AF37">EDUMITE Tutor</text>
    <text x="150" y="320" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#9AA4B2">Adaptive learning engine · LLMs · NLP analytics</text>
    <g font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="600" fill="#D4AF37">
      <rect x="150" y="354" width="54" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="177" y="369" text-anchor="middle">LLMs</text>
      <rect x="212" y="354" width="48" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="236" y="369" text-anchor="middle">NLP</text>
      <rect x="268" y="354" width="56" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="296" y="369" text-anchor="middle">React</text>
    </g>
    <g clip-path="url(#clip3)">
      <rect x="0" y="224" width="40" height="220" fill="#FFFFFF" opacity="0.07" transform="rotate(18 0 0)">
        <animate attributeName="x" values="20;460;20" dur="4s" begin="1.2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ===== CARD 4 ===== -->
  <ellipse cx="750" cy="418" rx="180" ry="13" fill="#000000" opacity="0.30"/>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0" dur="5s" begin="1.8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <rect x="550" y="262" width="400" height="150" rx="16" fill="url(#edge)"/>
    <rect x="540" y="250" width="400" height="150" rx="16" fill="url(#glass)" stroke="url(#goldH)" stroke-width="1.5"/>
    <rect x="552" y="280" width="4" height="92" rx="2" fill="url(#goldH)"/>
    <circle cx="590" cy="296" r="19" fill="#0D1117" stroke="url(#goldH)" stroke-width="1.5"/>
    <text x="590" y="303" text-anchor="middle" font-family="'Fira Code',monospace" font-size="17" font-weight="800" fill="#D4AF37">04</text>
    <text x="630" y="294" font-family="'Segoe UI',Arial,sans-serif" font-size="21" font-weight="800" fill="#D4AF37">ASI-Gen Engine</text>
    <text x="630" y="320" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#9AA4B2">RAG multi-agent statistical reports · BERT validation</text>
    <g font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="600" fill="#D4AF37">
      <rect x="630" y="354" width="50" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="655" y="369" text-anchor="middle">RAG</text>
      <rect x="688" y="354" width="96" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="736" y="369" text-anchor="middle">Multi-Agent</text>
      <rect x="792" y="354" width="56" height="22" rx="9" fill="#0D1117" stroke="url(#goldH)" stroke-width="1"/><text x="820" y="369" text-anchor="middle">BERT</text>
    </g>
    <g clip-path="url(#clip4)">
      <rect x="480" y="224" width="40" height="220" fill="#FFFFFF" opacity="0.07" transform="rotate(18 0 0)">
        <animate attributeName="x" values="500;940;500" dur="4s" begin="1.8s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
