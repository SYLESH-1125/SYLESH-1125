<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="760" viewBox="0 0 1380 760" role="img" aria-label="Career timeline 2023 — 2026">
  <style>
    .t-display     { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 800; font-size: 36px; letter-spacing: -0.01em; fill: #FFFFFF; }
    .t-tag         { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.30em; text-transform: uppercase; fill: #D4AF37; }
    .t-year        { font-family: 'JetBrains Mono','SF Mono',Consolas,monospace; font-weight: 800; font-size: 26px; letter-spacing: -0.04em; }
    .t-year-tag    { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; }
    .t-headline    { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -0.01em; fill: #FFFFFF; }
    .t-highlight   { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 500; font-size: 15px; fill: #F2F1EC; }
    .t-bullet      { font-family: 'JetBrains Mono','SF Mono',Consolas,monospace; font-weight: 700; font-size: 17px; }
    .t-stat-num    { font-family: 'JetBrains Mono','SF Mono',Consolas,monospace; font-weight: 700; font-size: 22px; }
    .t-stat-num-sm { font-family: 'JetBrains Mono','SF Mono',Consolas,monospace; font-weight: 700; font-size: 16px; }
    .t-stat-lbl    { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; fill: #8A8A8F; }
    .t-stat-lbl-sm { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 700; font-size: 9px;  letter-spacing: 0.10em; text-transform: uppercase; fill: #8A8A8F; }
    .timeline-pulse { stroke-dasharray: 4 8; animation: tlflow 3s linear infinite; }
    @keyframes tlflow { to { stroke-dashoffset: -36; } }
    .marker-pulse { animation: markerPulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes markerPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.10); opacity: 0.85; } }
    .live-pulse { animation: livePulse 1.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes livePulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 3px rgba(255,210,63,0.5)); } 50% { transform: scale(1.06); filter: drop-shadow(0 0 8px rgba(255,210,63,0.9)); } }
    .card-rise { opacity: 0; animation: cardRise 0.9s cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes cardRise { to { opacity: 1; } }
    .y0 { animation-delay: 0.30s; } .y1 { animation-delay: 0.50s; }
    .y2 { animation-delay: 0.70s; } .y3 { animation-delay: 0.90s; }
    .y4 { animation-delay: 1.10s; } .y5 { animation-delay: 1.30s; }
    /* Travelling edge highlight — colored segment loops around card perimeter,
       staggered per card. Matches the brain-region card pattern from R2-4. */
    .card-edge { stroke-dasharray: 80 1700; animation: cardEdgeTravel 4.4s linear infinite; filter: url(#cardEdgeGlow); opacity: 0.95; }
    @keyframes cardEdgeTravel { to { stroke-dashoffset: -1780; } }
    .ce0 { animation-delay: 0s; } .ce1 { animation-delay: 0.7s; }
    .ce2 { animation-delay: 1.4s; } .ce3 { animation-delay: 2.1s; }
    .ce4 { animation-delay: 2.8s; } .ce5 { animation-delay: 3.5s; }
    /* Inner radial glow — soft accent pulse from card center, slow 5s. */
    .card-inner-pulse { animation: cardPulse 5s ease-in-out infinite; }
    @keyframes cardPulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1.0; } }
  </style>
  <defs>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="0.8" fill="#D4AF37" fill-opacity="0.07"/></pattern>
    <linearGradient id="tlGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C9A24A"/><stop offset="33%" stop-color="#D4AF37"/><stop offset="66%" stop-color="#E8A33D"/><stop offset="100%" stop-color="#F3E6C4"/></linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1C1428" stop-opacity="0.94"/><stop offset="100%" stop-color="#0A0612" stop-opacity="0.94"/></linearGradient>
    <radialGradient id="markerGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
    <!-- Stacked drop shadow — 3 layers for real depth (replaces single shadow). -->
    <filter id="cardShadowStacked" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.30"/><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.40"/><feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#000" flood-opacity="0.30"/></filter>
    <filter id="cardEdgeGlow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.2"/></filter>
  </defs>
  <rect width="1380" height="760" fill="url(#dots)"/>
  <text x="690" y="42" class="t-tag" text-anchor="middle">⏵ CAREER · TIMELINE · 2024 — 2026 ⏴</text>
  <text x="690" y="78" class="t-display" text-anchor="middle">Yearly Journey</text>
  <line x1="140" y1="160" x2="1240" y2="160" stroke="url(#tlGrad)" stroke-width="3" stroke-opacity="0.4"/>
  <line x1="140" y1="160" x2="1240" y2="160" stroke="url(#tlGrad)" stroke-width="3" class="timeline-pulse"/>
  <g transform="translate(180,160)">
    <circle r="34" fill="url(#markerGlow)"/>
    <circle r="24" fill="#0A0A0B" stroke="#C9A24A" stroke-width="2" class="marker-pulse" style="animation-delay:0.0s"/>
    <text x="0" y="6" class="t-year" fill="#C9A24A" text-anchor="middle">'24</text>
  </g>
  <g transform="translate(520,160)">
    <circle r="34" fill="url(#markerGlow)"/>
    <circle r="24" fill="#0A0A0B" stroke="#D4AF37" stroke-width="2" class="marker-pulse" style="animation-delay:0.3s"/>
    <text x="0" y="6" class="t-year" fill="#D4AF37" text-anchor="middle">'25</text>
  </g>
  <g transform="translate(860,160)">
    <circle r="34" fill="url(#markerGlow)"/>
    <circle r="24" fill="#0A0A0B" stroke="#E8A33D" stroke-width="2" class="marker-pulse" style="animation-delay:0.6s"/>
    <text x="0" y="6" class="t-year" fill="#E8A33D" text-anchor="middle">'26</text>
  </g>
  <g transform="translate(1200,160)">
    <circle r="34" fill="url(#markerGlow)"/>
    <circle r="24" fill="#0A0A0B" stroke="#F3E6C4" stroke-width="2" class="marker-pulse" style="animation-delay:0.9s"/>
    <text x="0" y="6" class="t-year" fill="#F3E6C4" text-anchor="middle">'26</text>
    <g transform="translate(78, 0)">
      <g class="live-pulse">
        <rect x="0" y="-12" width="60" height="22" rx="11" fill="#F3E6C4"/>
        <circle cx="11" cy="-1" r="3.5" fill="#0A0A0B"/>
        <text x="40" y="3" class="t-year-tag" fill="#0A0A0B" text-anchor="middle" font-weight="700">LIVE</text>
      </g>
    </g>
  </g>
  <g transform="translate(20, 230)" class="card-rise y0">
    <line x1="160" y1="0" x2="160" y2="-60" stroke="#C9A24A" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="320" height="460" rx="16" fill="url(#cardBg)" filter="url(#cardShadowStacked)"/>
    <rect x="6" y="6" width="308" height="448" rx="12" fill="#C9A24A" fill-opacity="0.10" class="card-inner-pulse"/>
    <rect x="0" y="0" width="320" height="460" rx="16" fill="none" stroke="#C9A24A" stroke-width="2" pathLength="1780" class="card-edge ce0"/>
    <text x="24" y="42" class="t-year-tag" fill="#C9A24A">2024 · FOUNDATION</text>
    <text x="24" y="84" class="t-headline">First Steps</text>
    <line x1="24" y1="108" x2="296" y2="108" stroke="#141210" stroke-width="1"/>
    <text x="24"  y="144" class="t-bullet" fill="#C9A24A">▸</text>
    <text x="48"  y="144" class="t-highlight">Started B.E. CSE at Chennai</text>
    <text x="48"  y="164" class="t-highlight">Institute of Technology —</text>
    <text x="48"  y="184" class="t-highlight">CGPA 9.1/10 from day one.</text>
    <text x="24"  y="222" class="t-bullet" fill="#C9A24A">▸</text>
    <text x="48"  y="222" class="t-highlight">Built early projects in Python,</text>
    <text x="48"  y="242" class="t-highlight">Java, C++, and web basics.</text>
    <text x="24"  y="280" class="t-bullet" fill="#C9A24A">▸</text>
    <text x="48"  y="280" class="t-highlight">Began the hackathon circuit —</text>
    <text x="48"  y="300" class="t-highlight">first wins with Team</text>
    <text x="48"  y="320" class="t-highlight">DYNAMITE.</text>
    <line x1="24" y1="388" x2="296" y2="388" stroke="#141210" stroke-width="1"/>
    <text x="24"  y="422" class="t-stat-num" fill="#C9A24A">9.1</text>
    <text x="24"  y="444" class="t-stat-lbl">CGPA /10</text>
    <text x="114"  y="422" class="t-stat-num" fill="#C9A24A">6</text>
    <text x="114"  y="444" class="t-stat-lbl-sm">HACKATHONS</text>
    <text x="204"  y="424" class="t-stat-num-sm" fill="#C9A24A">TEAM</text>
    <text x="204"  y="444" class="t-stat-lbl">DYNAMITE</text>
  </g>
  <g transform="translate(360, 230)" class="card-rise y1">
    <line x1="160" y1="0" x2="160" y2="-60" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="320" height="460" rx="16" fill="url(#cardBg)" filter="url(#cardShadowStacked)"/>
    <rect x="6" y="6" width="308" height="448" rx="12" fill="#D4AF37" fill-opacity="0.10" class="card-inner-pulse"/>
    <rect x="0" y="0" width="320" height="460" rx="16" fill="none" stroke="#D4AF37" stroke-width="2" pathLength="1780" class="card-edge ce1"/>
    <text x="24" y="42" class="t-year-tag" fill="#D4AF37">2025 · GROWTH</text>
    <text x="24" y="84" class="t-headline">Internships &amp; Impact</text>
    <line x1="24" y1="108" x2="296" y2="108" stroke="#141210" stroke-width="1"/>
    <text x="24"  y="144" class="t-bullet" fill="#D4AF37">▸</text>
    <text x="48"  y="144" class="t-highlight">Delivered a Flutter + React</text>
    <text x="48"  y="164" class="t-highlight">hospital platform at BetShow.</text>
    <text x="24"  y="202" class="t-bullet" fill="#D4AF37">▸</text>
    <text x="48"  y="202" class="t-highlight">Built a React/Node + AI/ML</text>
    <text x="48"  y="222" class="t-highlight">platform at Reach Skyline.</text>
    <text x="24"  y="260" class="t-bullet" fill="#D4AF37">▸</text>
    <text x="48"  y="260" class="t-highlight">Climbed LeetCode to Knight —</text>
    <text x="48"  y="280" class="t-highlight">top 4.39% globally, 1000+</text>
    <text x="48"  y="300" class="t-highlight">problems solved.</text>
    <line x1="24" y1="388" x2="296" y2="388" stroke="#141210" stroke-width="1"/>
    <text x="24"  y="422" class="t-stat-num" fill="#D4AF37">2</text>
    <text x="24"  y="444" class="t-stat-lbl">INTERNSHIPS</text>
    <text x="114"  y="422" class="t-stat-num" fill="#D4AF37">Knight</text>
    <text x="114"  y="444" class="t-stat-lbl-sm">LEETCODE RANK</text>
    <text x="204"  y="422" class="t-stat-num" fill="#D4AF37">1000+</text>
    <text x="204"  y="444" class="t-stat-lbl">SOLVED</text>
  </g>
  <g transform="translate(700, 230)" class="card-rise y2">
    <line x1="160" y1="0" x2="160" y2="-60" stroke="#E8A33D" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="320" height="460" rx="16" fill="url(#cardBg)" filter="url(#cardShadowStacked)"/>
    <rect x="6" y="6" width="308" height="448" rx="12" fill="#E8A33D" fill-opacity="0.10" class="card-inner-pulse"/>
    <rect x="0" y="0" width="320" height="460" rx="16" fill="none" stroke="#E8A33D" stroke-width="2" pathLength="1780" class="card-edge ce2"/>
    <text x="24" y="42" class="t-year-tag" fill="#E8A33D">2026 · SHIPPING</text>
    <text x="24" y="84" class="t-headline">Agentic AI &amp; Production</text>
    <line x1="24" y1="108" x2="296" y2="108" stroke="#141210" stroke-width="1"/>
    <text x="24"  y="144" class="t-bullet" fill="#E8A33D">▸</text>
    <text x="48"  y="144" class="t-highlight">Agentic AI &amp; DevOps Intern</text>
    <text x="48"  y="164" class="t-highlight">at Cognizant — SLMs,</text>
    <text x="48"  y="184" class="t-highlight">DeepAgents, LLM orchestration.</text>
    <text x="24"  y="222" class="t-bullet" fill="#E8A33D">▸</text>
    <text x="48"  y="222" class="t-highlight">Shipping AI Forensic Platform,</text>
    <text x="48"  y="242" class="t-highlight">CrimeGPT, ASI-Gen, and</text>
    <text x="48"  y="262" class="t-highlight">EDUMITE in parallel.</text>
    <text x="24"  y="300" class="t-bullet" fill="#E8A33D">▸</text>
    <text x="48"  y="300" class="t-highlight">Leading Team DYNAMITE through</text>
    <text x="48"  y="320" class="t-highlight">6 national hackathons</text>
    <text x="48"  y="340" class="t-highlight">total.</text>
    <line x1="24" y1="388" x2="296" y2="388" stroke="#141210" stroke-width="1"/>
    <text x="24"  y="422" class="t-stat-num" fill="#E8A33D">4</text>
    <text x="24"  y="444" class="t-stat-lbl">LIVE BUILDS</text>
    <text x="114"  y="422" class="t-stat-num" fill="#E8A33D">6</text>
    <text x="114"  y="444" class="t-stat-lbl-sm">HACKATHONS</text>
    <text x="204"  y="422" class="t-stat-num" fill="#E8A33D">2000</text>
    <text x="204"  y="444" class="t-stat-lbl">MAX RATING</text>
  </g>
  <g transform="translate(1040, 230)" class="card-rise y3">
    <line x1="160" y1="0" x2="160" y2="-60" stroke="#F3E6C4" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="320" height="460" rx="16" fill="url(#cardBg)" filter="url(#cardShadowStacked)"/>
    <rect x="6" y="6" width="308" height="448" rx="12" fill="#F3E6C4" fill-opacity="0.10" class="card-inner-pulse"/>
    <rect x="0" y="0" width="320" height="460" rx="16" fill="none" stroke="#F3E6C4" stroke-width="2" pathLength="1780" class="card-edge ce3"/>
    <text x="24" y="42" class="t-year-tag" fill="#F3E6C4">2026 · WHAT’S NEXT</text>
    <text x="24" y="84" class="t-headline">Cloud &amp; Open Source</text>
    <line x1="24" y1="108" x2="296" y2="108" stroke="#141210" stroke-width="1"/>
    <text x="24"  y="144" class="t-bullet" fill="#F3E6C4">▸</text>
    <text x="48"  y="144" class="t-highlight">Deepening AWS and</text>
    <text x="48"  y="164" class="t-highlight">distributed-systems expertise</text>
    <text x="48"  y="184" class="t-highlight">for production scale.</text>
    <text x="24"  y="222" class="t-bullet" fill="#F3E6C4">▸</text>
    <text x="48"  y="222" class="t-highlight">Growing open-source footprint</text>
    <text x="48"  y="242" class="t-highlight">across AI and forensic tooling.</text>
    <text x="24"  y="280" class="t-bullet" fill="#F3E6C4">▸</text>
    <text x="48"  y="280" class="t-highlight">Aiming for a full-time AI/ML</text>
    <text x="48"  y="300" class="t-highlight">or full-stack engineering role.</text>
    <line x1="24" y1="388" x2="296" y2="388" stroke="#141210" stroke-width="1"/>
    <text x="24"  y="422" class="t-stat-num" fill="#F3E6C4">AWS</text>
    <text x="24"  y="444" class="t-stat-lbl">FOCUS AREA</text>
    <text x="114"  y="422" class="t-stat-num" fill="#F3E6C4">OSS</text>
    <text x="114"  y="444" class="t-stat-lbl-sm">GOAL</text>
    <text x="204"  y="422" class="t-stat-num" fill="#F3E6C4">'28</text>
    <text x="204"  y="444" class="t-stat-lbl">GRADUATION</text>
