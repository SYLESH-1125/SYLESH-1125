<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 460" width="1180" height="460" fill="none" role="img" aria-label="Yearly journey timeline 2022 to 2026 with milestone highlights and summary statistics, luxury gold theme">
  <defs>
    <linearGradient id="yjBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17171A"/>
      <stop offset="100%" stop-color="#0F0F11"/>
    </linearGradient>
    <filter id="yjShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <style>
    text{font-family:'Segoe UI',Arial,sans-serif}
    .badge{animation:blink 1.8s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  </style>

  <rect width="1180" height="460" fill="#0A0A0B"/>

  <text x="590" y="34" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="3" fill="#8A8A8F">CAREER TIMELINE &#183; 2022 - 2026</text>
  <text x="590" y="62" text-anchor="middle" font-size="24" font-weight="800" fill="#F2F1EC">Yearly Journey</text>

  <line x1="55" y1="95" x2="1125" y2="95" stroke="#D4AF37" stroke-opacity="0.35" stroke-width="1.4"/>

  <!-- 2022 -->
  <g transform="translate(20,110)">
    <circle cx="105" cy="-15" r="7" fill="#0A0A0B" stroke="#D4AF37" stroke-width="1.6"/>
    <rect width="210" height="270" rx="14" fill="url(#yjBg)" stroke="#2A2410" stroke-width="1.1" filter="url(#yjShadow)"/>
    <text x="18" y="30" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">2022 &#183; ORIGIN</text>
    <text x="18" y="55" font-size="18" font-weight="800" fill="#F2F1EC">First Steps</text>
    <text x="18" y="88"  font-size="11" fill="#B8B8BC">Began B.E. CSE @ CIT</text>
    <text x="18" y="108" font-size="11" fill="#B8B8BC">First lines of Python</text>
    <text x="18" y="128" font-size="11" fill="#B8B8BC">and DSA fundamentals</text>
    <text x="18" y="148" font-size="11" fill="#B8B8BC">Began competitive</text>
    <text x="18" y="168" font-size="11" fill="#B8B8BC">programming</text>
    <line x1="18" y1="205" x2="192" y2="205" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="18" y="236" font-size="19" font-weight="800" fill="#D4AF37">Day 1</text>
    <text x="18" y="254" font-size="9" letter-spacing="1" fill="#6E6E73">OF THE JOURNEY</text>
