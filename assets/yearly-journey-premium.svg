    <text x="18" y="55" font-size="18" font-weight="800" fill="#F2F1EC">Scaling Up</text>
    <text x="18" y="88"  font-size="11" fill="#B8B8BC">CYBERHACKATHON v4 -</text>
    <text x="18" y="108" font-size="11" fill="#B8B8BC">Top 20 of 800+ teams</text>
    <text x="18" y="128" font-size="11" fill="#B8B8BC">SUVIDHA 2026 - C-DAC</text>
