    <text x="18" y="30" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">2023 &#183; FOUNDATION</text>
    <text x="18" y="55" font-size="18" font-weight="800" fill="#F2F1EC">Team DYNAMITE</text>
    <text x="18" y="88"  font-size="11" fill="#B8B8BC">Formed Team DYNAMITE</text>
    <text x="18" y="108" font-size="11" fill="#B8B8BC">First hackathon finals</text>
    <text x="18" y="128" font-size="11" fill="#B8B8BC">Built first full-stack</text>
    <text x="18" y="148" font-size="11" fill="#B8B8BC">apps end-to-end</text>
