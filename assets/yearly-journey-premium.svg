  <line x1="55" y1="405" x2="1125" y2="405" stroke="#D4AF37" stroke-opacity="0.2"/>
  <g>
    <text x="130" y="435" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">3&#215;</text>
    <text x="130" y="452" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#6E6E73">HACKATHON WINS</text>

    <text x="360" y="435" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">25+</text>
    <text x="360" y="452" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#6E6E73">FINALIST SELECTIONS</text>

    <text x="590" y="435" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">1000+</text>
    <text x="590" y="452" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#6E6E73">PROBLEMS SOLVED</text>

    <text x="820" y="435" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">9.1</text>
    <text x="820" y="452" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#6E6E73">CGPA / 10</text>

    <text x="1050" y="435" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">Rs. 1.5L+</text>
    <text x="1050" y="452" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#6E6E73">GRANTS &amp; PRIZES</text>
