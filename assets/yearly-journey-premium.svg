<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 460" width="1180" height="460" fill="none" role="img" aria-label="Yearly journey timeline 2024 to 2026 with education, internships, and hackathon circuit, luxury gold theme">
  <defs>
    <linearGradient id="yjBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17171A"/>
      <stop offset="100%" stop-color="#0F0F11"/>
    </linearGradient>
    <filter id="yjShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <style>
    text{font-family:'Segoe UI',Arial,sans-serif}
    .badge{animation:blink 1.8s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  </style>

  <rect width="1180" height="460" fill="#0A0A0B"/>

  <text x="590" y="34" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="3" fill="#8A8A8F">CAREER TIMELINE &#183; 2024 - 2026</text>
  <text x="590" y="62" text-anchor="middle" font-size="24" font-weight="800" fill="#F2F1EC">Yearly Journey</text>

  <line x1="55" y1="95" x2="1125" y2="95" stroke="#D4AF37" stroke-opacity="0.35" stroke-width="1.4"/>

  <!-- 2024 -->
  <g transform="translate(65,110)">
    <circle cx="140" cy="-15" r="7" fill="#0A0A0B" stroke="#D4AF37" stroke-width="1.6"/>
    <rect width="280" height="270" rx="14" fill="url(#yjBg)" stroke="#2A2410" stroke-width="1.1" filter="url(#yjShadow)"/>
    <text x="20" y="30" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">2024 &#183; FOUNDATION</text>
    <text x="20" y="55" font-size="18" font-weight="800" fill="#F2F1EC">First Steps</text>
    <text x="20" y="88"  font-size="11" fill="#B8B8BC">Began B.E. CSE @ Chennai</text>
    <text x="20" y="108" font-size="11" fill="#B8B8BC">Institute of Technology (Sep)</text>
    <text x="20" y="128" font-size="11" fill="#B8B8BC">Joined BetShow Technologies</text>
    <text x="20" y="148" font-size="11" fill="#B8B8BC">as Full-Stack App &amp; Web Dev</text>
    <text x="20" y="168" font-size="11" fill="#B8B8BC">Formed Team DYNAMITE</text>
    <line x1="20" y1="205" x2="260" y2="205" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="20" y="236" font-size="19" font-weight="800" fill="#D4AF37">Day 1</text>
    <text x="20" y="254" font-size="9" letter-spacing="1" fill="#6E6E73">OF THE JOURNEY</text>
  </g>

  <!-- 2025 -->
  <g transform="translate(365,110)">
    <circle cx="140" cy="-15" r="7" fill="#0A0A0B" stroke="#D4AF37" stroke-width="1.6"/>
    <rect width="280" height="270" rx="14" fill="url(#yjBg)" stroke="#2A2410" stroke-width="1.1" filter="url(#yjShadow)"/>
    <text x="20" y="30" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">2025 &#183; MOMENTUM</text>
    <text x="20" y="55" font-size="18" font-weight="800" fill="#F2F1EC">Shipping &amp; Scaling</text>
    <text x="20" y="88"  font-size="11" fill="#B8B8BC">Delivered hospital mgmt.</text>
    <text x="20" y="108" font-size="11" fill="#B8B8BC">system (Flutter+React) @</text>
    <text x="20" y="128" font-size="11" fill="#B8B8BC">BetShow, through Jun</text>
    <text x="20" y="148" font-size="11" fill="#B8B8BC">Full-Stack &amp; AI Engineer</text>
    <text x="20" y="168" font-size="11" fill="#B8B8BC">Intern @ Reach Skyline (Nov-Dec)</text>
    <line x1="20" y1="205" x2="260" y2="205" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="20" y="236" font-size="19" font-weight="800" fill="#D4AF37">2</text>
    <text x="20" y="254" font-size="9" letter-spacing="1" fill="#6E6E73">INTERNSHIPS THIS YEAR</text>
  </g>

  <!-- 2026 LIVE -->
  <g transform="translate(665,110)">
    <circle cx="140" cy="-15" r="7" fill="#0A0A0B" stroke="#D4AF37" stroke-width="1.6"/>
    <rect width="280" height="270" rx="14" fill="url(#yjBg)" stroke="#D4AF37" stroke-width="1.6" filter="url(#yjShadow)"/>
    <text x="20" y="30" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">2026 &#183; CURRENT YEAR</text>
    <circle class="badge" cx="255" cy="24" r="4.5" fill="#D4AF37"/>
    <text x="265" y="28" font-size="9.5" font-weight="800" fill="#D4AF37">LIVE</text>
    <text x="20" y="55" font-size="18" font-weight="800" fill="#F2F1EC">Agentic AI &amp; DevOps</text>
    <text x="20" y="88"  font-size="11" fill="#B8B8BC">Agentic AI &amp; DevOps Intern</text>
    <text x="20" y="108" font-size="11" fill="#B8B8BC">@ Cognizant (Apr-Sep)</text>
    <text x="20" y="128" font-size="11" fill="#B8B8BC">Building SLM / DeepAgents</text>
    <text x="20" y="148" font-size="11" fill="#B8B8BC">pipelines for DevOps</text>
    <text x="20" y="168" font-size="11" fill="#B8B8BC">LeetCode Knight, top 4.39%</text>
    <line x1="20" y1="205" x2="260" y2="205" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="20" y="236" font-size="19" font-weight="800" fill="#D4AF37">Apr - Sep</text>
    <text x="20" y="254" font-size="9" letter-spacing="1" fill="#6E6E73">COGNIZANT INTERNSHIP</text>
  </g>

  <!-- Hackathon circuit summary -->
  <g transform="translate(965,110)">
    <circle cx="90" cy="-15" r="7" fill="#0A0A0B" stroke="#D4AF37" stroke-width="1.6"/>
    <rect width="180" height="270" rx="14" fill="#141210" stroke="#D4AF37" stroke-width="1.3" filter="url(#yjShadow)"/>
    <text x="18" y="30" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">TEAM DYNAMITE</text>
    <text x="18" y="55" font-size="16" font-weight="800" fill="#F2F1EC">Hackathon Circuit</text>
    <text x="18" y="88"  font-size="10.5" fill="#B8B8BC">Statathon - Runner-Up</text>
    <text x="18" y="106" font-size="10.5" fill="#B8B8BC">CSIC 1.0 - 4th of 5,000+</text>
    <text x="18" y="124" font-size="10.5" fill="#B8B8BC">HackSetu 1.0 - 2nd place</text>
    <text x="18" y="142" font-size="10.5" fill="#B8B8BC">Hack-A-Thon 1.0 - 2nd place</text>
    <text x="18" y="160" font-size="10.5" fill="#B8B8BC">CYBERHACKATHON v4 - Top 20</text>
    <text x="18" y="178" font-size="10.5" fill="#B8B8BC">SUVIDHA 2026 - Finalist</text>
    <line x1="18" y1="205" x2="162" y2="205" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="18" y="236" font-size="19" font-weight="800" fill="#D4AF37">6</text>
    <text x="18" y="254" font-size="9" letter-spacing="1" fill="#6E6E73">NATIONAL HACKATHONS</text>
  </g>

  <line x1="55" y1="405" x2="1125" y2="405" stroke="#D4AF37" stroke-opacity="0.2"/>
  <g>
    <text x="185" y="435" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">3</text>
    <text x="185" y="452" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#6E6E73">INTERNSHIPS</text>

    <text x="420" y="435" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">6</text>
    <text x="420" y="452" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#6E6E73">NATIONAL HACKATHONS</text>

    <text x="655" y="435" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">1000+</text>
    <text x="655" y="452" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#6E6E73">PROBLEMS SOLVED</text>

    <text x="890" y="435" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">9.1</text>
    <text x="890" y="452" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#6E6E73">CGPA / 10</text>

    <text x="1055" y="435" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">Rs. 1.5L+</text>
    <text x="1055" y="452" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#6E6E73">GRANTS &amp; PRIZES</text>
  </g>
</svg>
