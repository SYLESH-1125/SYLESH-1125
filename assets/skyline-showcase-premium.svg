<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" fill="none" role="img" aria-label="Three premium tiles previewing the GitHub Skyline 3D contribution model for 2024, 2025, and 2026 live">
  <defs>
    <linearGradient id="skTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17171A"/>
      <stop offset="100%" stop-color="#0D0D0E"/>
    </linearGradient>
    <linearGradient id="skTower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAD9A0"/>
      <stop offset="100%" stop-color="#8A6A28"/>
    </linearGradient>
    <linearGradient id="skTowerLive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>
  <style>
    text{font-family:'Segoe UI',Arial,sans-serif}
    .live{animation:pulse 2.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  </style>

  <!-- shared tower height pattern (12 months) -->
  <!-- Tile 1: 2024 -->
  <g transform="translate(20,20)">
    <rect width="360" height="280" rx="16" fill="url(#skTile)" stroke="#2A2410" stroke-width="1.2"/>
    <text x="24" y="34" font-size="13" font-weight="700" fill="#8A8A8F" letter-spacing="1">2024</text>
    <g transform="translate(24,230)">
      <rect x="0" y="-40" width="16" height="40" fill="url(#skTower)"/>
      <rect x="22" y="-60" width="16" height="60" fill="url(#skTower)"/>
      <rect x="44" y="-30" width="16" height="30" fill="url(#skTower)"/>
      <rect x="66" y="-70" width="16" height="70" fill="url(#skTower)"/>
      <rect x="88" y="-45" width="16" height="45" fill="url(#skTower)"/>
      <rect x="110" y="-85" width="16" height="85" fill="url(#skTower)"/>
      <rect x="132" y="-55" width="16" height="55" fill="url(#skTower)"/>
      <rect x="154" y="-95" width="16" height="95" fill="url(#skTower)"/>
      <rect x="176" y="-65" width="16" height="65" fill="url(#skTower)"/>
      <rect x="198" y="-110" width="16" height="110" fill="url(#skTower)"/>
      <rect x="220" y="-75" width="16" height="75" fill="url(#skTower)"/>
      <rect x="242" y="-50" width="16" height="50" fill="url(#skTower)"/>
      <rect x="-4" y="0" width="270" height="1.4" fill="#2A2410"/>
    </g>
    <text x="180" y="264" text-anchor="middle" font-size="11" fill="#6E6E73">12 monthly towers &#183; archived</text>
  </g>

  <!-- Tile 2: 2025 -->
  <g transform="translate(420,20)">
    <rect width="360" height="280" rx="16" fill="url(#skTile)" stroke="#2A2410" stroke-width="1.2"/>
    <text x="24" y="34" font-size="13" font-weight="700" fill="#8A8A8F" letter-spacing="1">2025</text>
    <g transform="translate(24,230)">
      <rect x="0" y="-55" width="16" height="55" fill="url(#skTower)"/>
      <rect x="22" y="-80" width="16" height="80" fill="url(#skTower)"/>
      <rect x="44" y="-60" width="16" height="60" fill="url(#skTower)"/>
      <rect x="66" y="-100" width="16" height="100" fill="url(#skTower)"/>
      <rect x="88" y="-70" width="16" height="70" fill="url(#skTower)"/>
      <rect x="110" y="-115" width="16" height="115" fill="url(#skTower)"/>
      <rect x="132" y="-90" width="16" height="90" fill="url(#skTower)"/>
      <rect x="154" y="-130" width="16" height="130" fill="url(#skTower)"/>
      <rect x="176" y="-100" width="16" height="100" fill="url(#skTower)"/>
      <rect x="198" y="-145" width="16" height="145" fill="url(#skTower)"/>
      <rect x="220" y="-110" width="16" height="110" fill="url(#skTower)"/>
      <rect x="242" y="-85" width="16" height="85" fill="url(#skTower)"/>
      <rect x="-4" y="0" width="270" height="1.4" fill="#2A2410"/>
    </g>
    <text x="180" y="264" text-anchor="middle" font-size="11" fill="#6E6E73">Reach Skyline &amp; BetShow &#183; archived</text>
  </g>

  <!-- Tile 3: 2026 live -->
  <g transform="translate(820,20)">
    <rect width="360" height="280" rx="16" fill="url(#skTile)" stroke="#D4AF37" stroke-width="1.6"/>
    <circle class="live" cx="332" cy="30" r="5" fill="#FF6B35"/>
    <text x="24" y="34" font-size="13" font-weight="700" fill="#D4AF37" letter-spacing="1">2026 &#183; LIVE</text>
    <g transform="translate(24,230)">
      <rect x="0" y="-70" width="16" height="70" fill="url(#skTowerLive)"/>
      <rect x="22" y="-95" width="16" height="95" fill="url(#skTowerLive)"/>
      <rect x="44" y="-80" width="16" height="80" fill="url(#skTowerLive)"/>
      <rect x="66" y="-120" width="16" height="120" fill="url(#skTowerLive)"/>
      <rect x="88" y="-100" width="16" height="100" fill="url(#skTowerLive)"/>
      <rect x="110" y="-150" width="16" height="150" fill="url(#skTowerLive)"/>
      <rect x="132" y="-125" width="16" height="125" fill="url(#skTowerLive)"/>
      <rect x="154" y="-165" width="16" height="165" fill="url(#skTowerLive)"/>
      <rect x="176" y="-40" width="16" height="40" fill="url(#skTowerLive)" opacity="0.35"/>
      <rect x="198" y="-30" width="16" height="30" fill="url(#skTowerLive)" opacity="0.25"/>
      <rect x="220" y="-20" width="16" height="20" fill="url(#skTowerLive)" opacity="0.18"/>
      <rect x="242" y="-15" width="16" height="15" fill="url(#skTowerLive)" opacity="0.12"/>
      <rect x="-4" y="0" width="270" height="1.4" fill="#D4AF37" opacity="0.6"/>
    </g>
    <text x="180" y="264" text-anchor="middle" font-size="11" fill="#8A8A8F">Cognizant internship &#183; growing monthly</text>
  </g>
</svg>
