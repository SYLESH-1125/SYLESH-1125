<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 32" width="1200" height="32" fill="none" role="img" aria-label="Decorative premium gold divider">
  <defs>
    <linearGradient id="divGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A0A0B" stop-opacity="0"/>
      <stop offset="18%" stop-color="#8A6A28"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="82%" stop-color="#8A6A28"/>
      <stop offset="100%" stop-color="#0A0A0B" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .shimmer{animation:sw 3.5s ease-in-out infinite}
    @keyframes sw{0%,100%{opacity:.55}50%{opacity:1}}
  </style>
  <rect x="0" y="15" width="1200" height="1.4" fill="url(#divGrad)"/>
  <circle class="shimmer" cx="600" cy="16" r="3.2" fill="#E8A33D"/>
  <circle cx="588" cy="16" r="1.4" fill="#D4AF37" opacity="0.7"/>
  <circle cx="612" cy="16" r="1.4" fill="#D4AF37" opacity="0.7"/>
</svg>
