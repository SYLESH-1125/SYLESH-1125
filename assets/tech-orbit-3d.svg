<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" fill="none" role="img" aria-label="Animated 3D skill constellation orbit">
  <defs>
    <radialGradient id="core" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#FFF8D6"/>
      <stop offset="30%" stop-color="#F5E36A"/>
      <stop offset="72%" stop-color="#A9851C"/>
      <stop offset="100%" stop-color="#1C1604"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5E36A"/>
      <stop offset="100%" stop-color="#7A5E10"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .s1{animation:tw 3s ease-in-out 0s infinite}
    .s2{animation:tw 3.6s ease-in-out -0.5s infinite}
    .s3{animation:tw 4s ease-in-out -1s infinite}
    .s4{animation:tw 3.2s ease-in-out -1.4s infinite}
    .s5{animation:tw 2.8s ease-in-out -0.8s infinite}

    .r1{transform-origin:300px 300px;animation:cw 40s linear infinite}
    .r2{transform-origin:300px 300px;animation:ccw 48s linear infinite}

    /* Outer orbit (18s CW) — carrier rotates around SVG center */
    .oc1{transform-origin:300px 300px;animation:cw 18s linear 0s infinite}
    .oc2{transform-origin:300px 300px;animation:cw 18s linear -6s infinite}
    .oc3{transform-origin:300px 300px;animation:cw 18s linear -12s infinite}
    /* counter-rotate labels so they stay upright */
    .ok1{transform-box:fill-box;transform-origin:50% 50%;animation:ccw 18s linear 0s infinite}
    .ok2{transform-box:fill-box;transform-origin:50% 50%;animation:ccw 18s linear -6s infinite}
    .ok3{transform-box:fill-box;transform-origin:50% 50%;animation:ccw 18s linear -12s infinite}

    /* Inner orbit (26s CCW) */
    .ic1{transform-origin:300px 300px;animation:ccw 26s linear 0s infinite}
    .ic2{transform-origin:300px 300px;animation:ccw 26s linear -13s infinite}
    .ic3{transform-origin:300px 300px;animation:ccw 26s linear -21.67s infinite}
    .ik1{transform-box:fill-box;transform-origin:50% 50%;animation:cw 26s linear 0s infinite}
    .ik2{transform-box:fill-box;transform-origin:50% 50%;animation:cw 26s linear -13s infinite}
    .ik3{transform-box:fill-box;transform-origin:50% 50%;animation:cw 26s linear -21.67s infinite}

    .cp{transform-origin:300px 300px;animation:pulse 3s ease-in-out infinite}

    @keyframes tw{0%,100%{opacity:.2}50%{opacity:1}}
    @keyframes cw{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes ccw{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
  </style>

  <!-- starfield -->
  <g fill="#F5E36A">
    <circle class="s1" cx="70"  cy="90"  r="1.6"/>
    <circle class="s2" cx="530" cy="120" r="2"/>
    <circle class="s3" cx="500" cy="500" r="1.5"/>
    <circle class="s4" cx="90"  cy="470" r="1.8"/>
    <circle class="s5" cx="300" cy="40"  r="1.4"/>
  </g>

  <!-- depth-cue orbit ellipses -->
  <ellipse class="r1" cx="300" cy="300" rx="230" ry="92"  fill="none" stroke="url(#ring)" stroke-width="1.5" stroke-dasharray="2 9" opacity="0.45"/>
  <ellipse          cx="300" cy="300" rx="150" ry="150" fill="none" stroke="url(#ring)" stroke-width="1.5" stroke-dasharray="2 9" opacity="0.40"/>
  <ellipse class="r2" cx="300" cy="300" rx="92"  ry="230" fill="none" stroke="url(#ring)" stroke-width="1.5" stroke-dasharray="2 9" opacity="0.35"/>

  <!-- ── OUTER RING (radius 230, 18s CW) ── -->
  <!-- Node 1: 0° offset -->
  <g class="oc1"><g transform="translate(300,70)"><g class="ok1">
    <circle r="30" fill="#0D1117" stroke="url(#ring)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#F5E36A">AI/ML</text>
  </g></g></g>

  <!-- Node 2: 120° offset -->
  <g class="oc2"><g transform="translate(300,70)"><g class="ok2">
    <circle r="30" fill="#0D1117" stroke="url(#ring)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#F5E36A">Flutter</text>
  </g></g></g>

  <!-- Node 3: 240° offset -->
  <g class="oc3"><g transform="translate(300,70)"><g class="ok3">
    <circle r="30" fill="#0D1117" stroke="url(#ring)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="800" fill="#F5E36A">Next.js</text>
  </g></g></g>

  <!-- ── INNER RING (radius 150, 26s CCW) ── -->
  <!-- Node 4: 0° offset -->
  <g class="ic1"><g transform="translate(300,150)"><g class="ik1">
    <circle r="27" fill="#0D1117" stroke="url(#ring)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="800" fill="#F5E36A">Node</text>
  </g></g></g>

  <!-- Node 5: 180° offset -->
  <g class="ic2"><g transform="translate(300,150)"><g class="ik2">
    <circle r="27" fill="#0D1117" stroke="url(#ring)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="800" fill="#F5E36A">Python</text>
  </g></g></g>

  <!-- Node 6: 60° offset (CCW → delay = 300/360 × 26s) -->
  <g class="ic3"><g transform="translate(300,150)"><g class="ik3">
    <circle r="27" fill="#0D1117" stroke="url(#ring)" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" font-weight="800" fill="#F5E36A">Cloud</text>
  </g></g></g>

  <!-- pulsing core -->
  <g class="cp">
    <circle cx="300" cy="300" r="58" fill="url(#core)" filter="url(#glow)"/>
    <ellipse cx="282" cy="282" rx="20" ry="12" fill="#FFFFFF" opacity="0.35"/>
    <text x="300" y="309" text-anchor="middle" font-family="'Fira Code',monospace" font-size="30" font-weight="800" fill="#1A1500">&lt;/&gt;</text>
  </g>
</svg>
