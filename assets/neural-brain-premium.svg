<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" width="980" height="640" fill="none" role="img" aria-label="Original brain-shaped skill atlas, lateral view, recolored in luxury gold, mapping Backend, System Design, Frontend, AI and Data, Cloud and DevOps, and Competitive Programming to brain regions">
  <defs>
    <radialGradient id="brainFill" cx="38%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#3A2E14"/>
      <stop offset="55%" stop-color="#211B0E"/>
      <stop offset="100%" stop-color="#141210"/>
    </radialGradient>
    <linearGradient id="brainStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E6C4"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8A6A28"/>
    </linearGradient>
    <filter id="brainGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    text{font-family:'Segoe UI',Arial,sans-serif}
    .pulse{animation:bp 3.6s ease-in-out infinite}
    @keyframes bp{0%,100%{opacity:.85}50%{opacity:1}}
    .gyrus{animation:flicker 4.5s ease-in-out infinite}
    @keyframes flicker{0%,100%{opacity:.35}50%{opacity:.7}}
    .dot{animation:dotpulse 2.2s ease-in-out infinite}
    @keyframes dotpulse{0%,100%{r:4.5;opacity:1}50%{r:6.5;opacity:.5}}
  </style>

  <rect width="980" height="640" fill="#0A0A0B"/>
  <text x="490" y="34" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="3" fill="#8A8A8F">NEURAL SKILL ATLAS &#183; V1</text>
  <text x="490" y="60" text-anchor="middle" font-size="21" font-weight="800" fill="#F2F1EC">How My Technical Mind Is Wired</text>

  <!-- ORIGINAL stylized brain silhouette (lateral view), not anatomical tracing -->
  <g class="pulse" filter="url(#brainGlow)" transform="translate(300,150)">
    <path d="M 60,180
             C 20,140 15,80 70,50
             C 95,10 165,-15 230,5
             C 280,-20 350,-10 385,30
             C 440,15 500,45 495,100
             C 545,110 555,170 510,205
             C 525,250 495,300 445,300
             C 435,335 395,355 355,340
             C 335,365 285,365 265,340
             C 220,355 175,335 165,300
             C 115,300 75,265 75,225
             C 45,220 40,195 60,180 Z"
          fill="url(#brainFill)" stroke="url(#brainStroke)" stroke-width="3"/>
    <!-- cerebellum -->
    <path d="M 445,270 C 480,265 510,285 505,315 C 500,345 460,350 435,330 C 420,310 425,280 445,270 Z"
          fill="url(#brainFill)" stroke="url(#brainStroke)" stroke-width="2.4"/>
    <!-- brainstem -->
    <path d="M 340,330 C 335,360 340,390 355,410 C 370,390 372,360 368,335 Z"
          fill="url(#brainFill)" stroke="url(#brainStroke)" stroke-width="2.2"/>

    <!-- gyri texture lines -->
    <g class="gyrus" stroke="#D4AF37" stroke-width="1.3" fill="none" stroke-linecap="round">
      <path d="M 110,120 C 140,100 180,95 210,110"/>
      <path d="M 150,160 C 190,140 240,140 270,160"/>
      <path d="M 200,60 C 230,45 270,45 295,65"/>
      <path d="M 300,50 C 340,35 385,45 405,70"/>
      <path d="M 320,110 C 360,95 410,100 435,125"/>
      <path d="M 350,180 C 395,170 440,180 460,205"/>
      <path d="M 250,230 C 290,220 335,225 360,245"/>
      <path d="M 150,220 C 185,215 220,220 245,235"/>
    </g>
  </g>

  <!-- label cards with leader lines and colored dots -->
  <!-- Frontal -> Backend -->
  <g transform="translate(30,150)">
    <line x1="196" y1="26" x2="330" y2="90" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1.3"/>
    <circle class="dot" cx="330" cy="90" r="4.5" fill="#D4AF37"/>
    <rect width="196" height="66" rx="12" fill="#141210" stroke="#2A2410" stroke-width="1.2"/>
    <text x="16" y="24" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">FRONTAL LOBE</text>
    <text x="16" y="46" font-size="14.5" font-weight="800" fill="#D4AF37">Backend</text>
    <text x="16" y="62" font-size="9.5" fill="#8A8A8F">Node &#183; FastAPI &#183; Django</text>
  </g>

  <!-- Parietal -> System Design -->
  <g transform="translate(390,20)">
    <line x1="98" y1="66" x2="90" y2="120" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1.3"/>
    <circle class="dot" cx="90" cy="120" r="4.5" fill="#D4AF37"/>
    <rect width="196" height="66" rx="12" fill="#141210" stroke="#2A2410" stroke-width="1.2"/>
    <text x="16" y="24" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">PARIETAL LOBE</text>
    <text x="16" y="46" font-size="14.5" font-weight="800" fill="#D4AF37">System Design</text>
    <text x="16" y="62" font-size="9.5" fill="#8A8A8F">HLD/LLD &#183; Kafka &#183; Microservices</text>
  </g>

  <!-- Occipital -> Frontend -->
  <g transform="translate(750,150)">
    <line x1="0" y1="26" x2="-105" y2="80" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1.3"/>
    <circle class="dot" cx="-105" cy="80" r="4.5" fill="#D4AF37"/>
    <rect width="200" height="66" rx="12" fill="#141210" stroke="#2A2410" stroke-width="1.2"/>
    <text x="16" y="24" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">OCCIPITAL LOBE</text>
    <text x="16" y="46" font-size="14.5" font-weight="800" fill="#D4AF37">Frontend</text>
    <text x="16" y="62" font-size="9.5" fill="#8A8A8F">React &#183; Next.js &#183; Three.js</text>
  </g>

  <!-- Temporal -> AI & Data -->
  <g transform="translate(760,320)">
    <line x1="0" y1="30" x2="-110" y2="0" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1.3"/>
    <circle class="dot" cx="-110" cy="0" r="4.5" fill="#D4AF37"/>
    <rect width="200" height="66" rx="12" fill="#141210" stroke="#2A2410" stroke-width="1.2"/>
    <text x="16" y="24" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">TEMPORAL LOBE</text>
    <text x="16" y="46" font-size="14.5" font-weight="800" fill="#D4AF37">AI &amp; Data</text>
    <text x="16" y="62" font-size="9.5" fill="#8A8A8F">PyTorch &#183; LLMs &#183; RAG</text>
  </g>

  <!-- Brainstem -> Cloud & DevOps -->
  <g transform="translate(390,500)">
    <line x1="98" y1="0" x2="80" y2="-50" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1.3"/>
    <circle class="dot" cx="80" cy="-50" r="4.5" fill="#D4AF37"/>
    <rect width="196" height="66" rx="12" fill="#141210" stroke="#2A2410" stroke-width="1.2"/>
    <text x="16" y="24" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">BRAINSTEM</text>
    <text x="16" y="46" font-size="14.5" font-weight="800" fill="#D4AF37">Cloud &amp; DevOps</text>
    <text x="16" y="62" font-size="9.5" fill="#8A8A8F">AWS &#183; Docker &#183; Kubernetes</text>
  </g>

  <!-- Cerebellum -> Competitive Programming -->
  <g transform="translate(30,470)">
    <line x1="196" y1="10" x2="360" y2="-40" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1.3"/>
    <circle class="dot" cx="360" cy="-40" r="4.5" fill="#D4AF37"/>
    <rect width="196" height="66" rx="12" fill="#141210" stroke="#2A2410" stroke-width="1.2"/>
    <text x="16" y="24" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#6E6E73">CEREBELLUM</text>
    <text x="16" y="46" font-size="13" font-weight="800" fill="#D4AF37">Competitive Prog.</text>
    <text x="16" y="62" font-size="9.5" fill="#8A8A8F">1000+ solved &#183; Knight badge</text>
  </g>

  <text x="490" y="618" text-anchor="middle" font-size="10" fill="#6E6E73">Original stylized illustration &#183; not a medical anatomy tracing</text>
</svg>
