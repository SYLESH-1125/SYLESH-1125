<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 620" width="460" height="620" fill="none" role="img" aria-label="Holographic 3D standing developer avatar">
  <defs>
    <radialGradient id="fHeadG" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#FFF8D6"/>
      <stop offset="45%" stop-color="#F5E36A"/>
      <stop offset="100%" stop-color="#7A5E10"/>
    </radialGradient>
    <linearGradient id="fBodyG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1800"/>
      <stop offset="50%" stop-color="#0D0B00"/>
      <stop offset="100%" stop-color="#1C1800"/>
    </linearGradient>
    <linearGradient id="fGoldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF1A6"/>
      <stop offset="60%" stop-color="#F5E36A"/>
      <stop offset="100%" stop-color="#A9851C"/>
    </linearGradient>
    <linearGradient id="fAura" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E36A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F5E36A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="fHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5E36A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F5E36A" stop-opacity="0"/>
    </radialGradient>
    <filter id="fGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fSoftGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fDeepGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="fBodyClip">
      <path d="M148 205 L312 205 L295 390 L165 390 Z"/>
    </clipPath>
    <clipPath id="fHeadClip">
      <circle cx="230" cy="108" r="56"/>
    </clipPath>
  </defs>

  <style>
    .fig    { animation: figFloat 4.2s ease-in-out infinite; transform-origin: 230px 310px; }
    .shadow { transform-origin: 230px 568px; animation: figShadow 4.2s ease-in-out infinite; }
    .scan   { animation: figScan 3.6s linear infinite; }
    .halo   { animation: figPulse 3s ease-in-out infinite; }
    .ring1  { transform-origin: 230px 340px; animation: figCW  10s linear infinite; }
    .ring2  { transform-origin: 230px 340px; animation: figCCW 14s linear infinite; }
    .dot1   { animation: figTw 2.8s ease-in-out 0s infinite; }
    .dot2   { animation: figTw 3.4s ease-in-out -1s infinite; }
    .dot3   { animation: figTw 4s   ease-in-out -2s infinite; }
    .dot4   { animation: figTw 3.1s ease-in-out -0.6s infinite; }
    .dot5   { animation: figTw 2.5s ease-in-out -1.8s infinite; }
    .circ   { animation: figCirc 4s ease-in-out infinite alternate; stroke-dasharray: 60 40; }
    .eyegl  { animation: figBlink 5s ease-in-out infinite; }
    .hband  { animation: figPulse 2.5s ease-in-out infinite; }

    @keyframes figFloat  { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-14px)} }
    @keyframes figShadow { 0%,100%{transform:scaleX(1);opacity:.22} 50%{transform:scaleX(.72);opacity:.1} }
    @keyframes figScan   { 0%{transform:translateY(0);opacity:.7} 100%{transform:translateY(-340px);opacity:0} }
    @keyframes figPulse  { 0%,100%{opacity:.35} 50%{opacity:.85} }
    @keyframes figCW     { from{transform:rotate(0deg)}   to{transform:rotate(360deg)} }
    @keyframes figCCW    { from{transform:rotate(0deg)}   to{transform:rotate(-360deg)} }
    @keyframes figTw     { 0%,100%{opacity:.15} 50%{opacity:.9} }
    @keyframes figCirc   { from{stroke-dashoffset:100} to{stroke-dashoffset:0} }
    @keyframes figBlink  { 0%,90%,100%{ry:5} 92%,98%{ry:1} }
  </style>

  <!-- ── GROUND SHADOW ── -->
  <ellipse class="shadow" cx="230" cy="568" rx="88" ry="14" fill="#F5E36A"/>

  <!-- ── ORBITAL RINGS (behind figure) ── -->
  <ellipse class="ring1" cx="230" cy="340" rx="170" ry="65" stroke="#F5E36A" stroke-width="1" stroke-dasharray="4 10" opacity="0.28"/>
  <ellipse class="ring2" cx="230" cy="340" rx="140" ry="52" stroke="#FFF1A6" stroke-width="0.7" stroke-dasharray="2 8" opacity="0.20"/>

  <!-- ── FIGURE GROUP (floats) ── -->
  <g class="fig">

    <!-- Deep aura glow behind body -->
    <ellipse cx="230" cy="310" rx="90" ry="200" fill="url(#fHalo)" filter="url(#fDeepGlow)"/>

    <!-- ══ LEGS ══ -->
    <!-- Left leg -->
    <path d="M183 388 Q178 460 170 538 L192 538 Q196 460 200 388 Z"
          fill="url(#fBodyG)" stroke="url(#fGoldV)" stroke-width="1.6"/>
    <!-- Right leg -->
    <path d="M277 388 Q282 460 290 538 L268 538 Q264 460 260 388 Z"
          fill="url(#fBodyG)" stroke="url(#fGoldV)" stroke-width="1.6"/>
    <!-- Knee pads -->
    <ellipse cx="182" cy="454" rx="12" ry="8" fill="#0D0B00" stroke="#F5E36A" stroke-width="1.2"/>
    <ellipse cx="278" cy="454" rx="12" ry="8" fill="#0D0B00" stroke="#F5E36A" stroke-width="1.2"/>
    <!-- Boots -->
    <path d="M168 534 Q162 542 158 552 L195 552 L195 534 Z" fill="#1C1800" stroke="#F5E36A" stroke-width="1.5"/>
    <path d="M292 534 Q298 542 302 552 L265 552 L265 534 Z" fill="#1C1800" stroke="#F5E36A" stroke-width="1.5"/>
    <!-- Boot shine -->
    <line x1="162" y1="544" x2="188" y2="540" stroke="#F5E36A" stroke-width="1" opacity="0.5"/>
    <line x1="298" y1="544" x2="272" y2="540" stroke="#F5E36A" stroke-width="1" opacity="0.5"/>

    <!-- ══ TORSO / HOODIE ══ -->
    <!-- Back shadow of hoodie for depth -->
    <path d="M146 208 L314 208 L298 392 L162 392 Z" fill="#080700" opacity="0.6"/>
    <!-- Main hoodie body -->
    <path d="M148 205 L312 205 L295 390 L165 390 Z" fill="url(#fBodyG)" stroke="url(#fGoldV)" stroke-width="1.8"/>
    <!-- Center zip line -->
    <line x1="230" y1="210" x2="230" y2="388" stroke="#F5E36A" stroke-width="1.2" opacity="0.4"/>
    <!-- Hoodie pocket -->
    <path d="M190 330 Q190 370 230 372 Q270 370 270 330" fill="none" stroke="#F5E36A" stroke-width="1.2" opacity="0.5"/>
    <!-- Chest emblem -->
    <circle cx="230" cy="268" r="20" fill="#0D0B00" stroke="url(#fGoldV)" stroke-width="1.5"/>
    <text x="230" y="274" text-anchor="middle" font-family="'Fira Code','Courier New',monospace" font-size="14" font-weight="800" fill="#F5E36A">&lt;/&gt;</text>
    <!-- Circuit traces on torso -->
    <g stroke="#F5E36A" stroke-width="0.8" opacity="0.35" fill="none">
      <polyline points="162,240 175,240 180,250 195,250"/>
      <polyline points="298,240 285,240 280,250 265,250"/>
      <polyline points="163,300 178,300 182,308"/>
      <polyline points="297,300 282,300 278,308"/>
    </g>
    <!-- Scan line over body -->
    <rect class="scan" x="148" y="340" width="147" height="4" rx="2" fill="url(#fGoldV)" opacity="0.55" clip-path="url(#fBodyClip)"/>

    <!-- ══ ARMS ══ -->
    <!-- Left arm (slightly bent outward at elbow) -->
    <path d="M148 210 L115 222 L100 320 L108 370 L124 370 L116 322 L130 224 L148 218 Z"
          fill="url(#fBodyG)" stroke="url(#fGoldV)" stroke-width="1.6"/>
    <!-- Right arm -->
    <path d="M312 210 L345 222 L360 320 L352 370 L336 370 L344 322 L330 224 L312 218 Z"
          fill="url(#fBodyG)" stroke="url(#fGoldV)" stroke-width="1.6"/>
    <!-- Elbow pads -->
    <ellipse cx="112" cy="326" rx="11" ry="8" fill="#0D0B00" stroke="#F5E36A" stroke-width="1.2"/>
    <ellipse cx="348" cy="326" rx="11" ry="8" fill="#0D0B00" stroke="#F5E36A" stroke-width="1.2"/>
    <!-- Gloves / hands -->
    <path d="M106 368 Q100 380 102 392 Q110 402 124 398 Q128 388 126 372 Z"
          fill="url(#fHeadG)" stroke="#F5E36A" stroke-width="1.2"/>
    <path d="M354 368 Q360 380 358 392 Q350 402 336 398 Q332 388 334 372 Z"
          fill="url(#fHeadG)" stroke="#F5E36A" stroke-width="1.2"/>
    <!-- Wrist bands -->
    <rect x="102" y="364" width="28" height="8" rx="4" fill="#0D0B00" stroke="#F5E36A" stroke-width="1.2"/>
    <rect x="330" y="364" width="28" height="8" rx="4" fill="#0D0B00" stroke="#F5E36A" stroke-width="1.2"/>

    <!-- ══ SHOULDERS ══ -->
    <ellipse cx="148" cy="207" rx="26" ry="16" fill="#0D0B00" stroke="url(#fGoldV)" stroke-width="2"/>
    <ellipse cx="312" cy="207" rx="26" ry="16" fill="#0D0B00" stroke="url(#fGoldV)" stroke-width="2"/>
    <ellipse cx="148" cy="203" rx="20" ry="10" fill="#F5E36A" opacity="0.12"/>
    <ellipse cx="312" cy="203" rx="20" ry="10" fill="#F5E36A" opacity="0.12"/>

    <!-- ══ NECK ══ -->
    <rect x="212" y="154" width="36" height="54" rx="10" fill="url(#fHeadG)" stroke="#F5E36A" stroke-width="1.2"/>

    <!-- ══ HEAD ══ -->
    <!-- Head glow -->
    <circle cx="230" cy="105" r="62" fill="#F5E36A" opacity="0.08" filter="url(#fDeepGlow)"/>
    <!-- Hoodie hood (behind head) -->
    <path d="M168 118 Q162 64 230 52 Q298 64 292 118 Q270 88 230 86 Q190 88 168 118 Z"
          fill="#1C1800" stroke="url(#fGoldV)" stroke-width="1.5"/>
    <!-- Head sphere -->
    <circle cx="230" cy="108" r="54" fill="url(#fHeadG)" stroke="url(#fGoldV)" stroke-width="2" filter="url(#fSoftGlow)"/>
    <!-- Highlight -->
    <ellipse cx="212" cy="86" rx="20" ry="13" fill="#FFFFFF" opacity="0.28"/>
    <!-- Eyes -->
    <ellipse cx="212" cy="108" rx="10" ry="6" fill="#1A1500"/>
    <ellipse cx="248" cy="108" rx="10" ry="6" fill="#1A1500"/>
    <!-- Eye glow -->
    <ellipse class="eyegl" cx="212" cy="107" rx="5" ry="5" fill="#F5E36A" filter="url(#fSoftGlow)"/>
    <ellipse class="eyegl" cx="248" cy="107" rx="5" ry="5" fill="#F5E36A" filter="url(#fSoftGlow)"/>
    <!-- Nose hint -->
    <circle cx="230" cy="120" r="2.5" fill="#8A6A12" opacity="0.6"/>
    <!-- Smile -->
    <path d="M216 131 Q230 141 244 131" stroke="#7A5E10" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Scan line on head -->
    <rect class="scan" x="176" y="145" width="108" height="3" rx="1.5" fill="#F5E36A" opacity="0.45" clip-path="url(#fHeadClip)"/>
    <!-- Head circuit -->
    <path class="circ" cx="230" cy="108" d="M176 108 Q176 55 230 52 Q284 55 284 108"
          stroke="#F5E36A" stroke-width="0.8" fill="none" opacity="0.35"/>

    <!-- ══ FLOATING TECH PARTICLES ══ -->
    <g fill="#F5E36A">
      <circle class="dot1" cx="80"  cy="170" r="3.5"/>
      <circle class="dot2" cx="62"  cy="290" r="2.5"/>
      <circle class="dot3" cx="90"  cy="420" r="2"/>
      <circle class="dot4" cx="380" cy="200" r="3"/>
      <circle class="dot5" cx="392" cy="360" r="2.5"/>
    </g>
    <!-- Small diamond particles -->
    <g fill="#FFF8D6" opacity="0.5">
      <rect class="dot2" x="374" y="148" width="5" height="5" rx="1" transform="rotate(45 376.5 150.5)"/>
      <rect class="dot4" x="68"  y="460" width="4" height="4" rx="1" transform="rotate(45 70 462)"/>
    </g>

    <!-- ══ HALO / HEADING BAND ══ -->
    <ellipse class="hband" cx="230" cy="60" rx="56" ry="8" fill="none" stroke="#F5E36A" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.5"/>

  </g>

  <!-- Foreground subtle bottom light -->
  <rect x="0" y="555" width="460" height="20" fill="url(#fAura)" opacity="0.6"/>
</svg>
