    <rect x="0" y="0" width="6" height="290" rx="3" fill="#F5E36A"/>
    <text x="24" y="34" font-size="11" font-weight="700" letter-spacing="2" fill="#F5E36A" opacity="0.75">PLATFORM À CI/CD À DEPLOY</text>
