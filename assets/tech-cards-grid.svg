    <rect x="0" y="0" width="6" height="290" rx="3" fill="#F5E36A"/>
    <text x="24" y="34" font-size="11" font-weight="700" letter-spacing="2" fill="#F5E36A" opacity="0.75">SCALE À DESIGN À DISTRIBUTED</text>
    <text x="24" y="70" font-size="22" font-weight="800" fill="#FFFFFF"><Î System Design</text>
    <text x="24" y="98" font-size="13" fill="#B9B9B9">Event-driven, scalable backend systems.</text>
    <text x="24" y="140" font-size="13.5" font-weight="600" fill="#F5E36A">Microservices À Kafka</text>
    <text x="24" y="162" font-size="13.5" font-weight="600" fill="#F5E36A">API Design À HLD/LLD</text>
