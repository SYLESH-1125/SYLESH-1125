    <rect x="0" y="0" width="6" height="290" rx="3" fill="#F5E36A"/>
    <text x="24" y="34" font-size="11" font-weight="700" letter-spacing="2" fill="#F5E36A" opacity="0.75">LLMs À RAG À AGENTS</text>
    <text x="24" y="70" font-size="24" font-weight="800" fill="#FFFFFF">> AI &amp; Agentic Systems</text>
    <text x="24" y="98" font-size="13" fill="#B9B9B9">Autonomous pipelines &amp; NLP intelligence.</text>
    <text x="24" y="140" font-size="13.5" font-weight="600" fill="#F5E36A">LangChain À RAG</text>
    <text x="24" y="162" font-size="13.5" font-weight="600" fill="#F5E36A">LLMs À LangGraph</text>
    <line x1="24" y1="196" x2="266" y2="196" stroke="#F5E36A" stroke-opacity="0.2"/>
    <text x="24"  y="230" font-size="22" font-weight="800" fill="#FFFFFF">2+</text>
    <text x="24"  y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">YEARS</text>
    <text x="118" y="230" font-size="22" font-weight="800" fill="#FFFFFF">10+</text>
    <text x="118" y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">PROJECTS</text>
    <text x="212" y="230" font-size="15" font-weight="800" fill="#F5E36A">ADVANCED</text>
    <text x="212" y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">MASTERY</text>
