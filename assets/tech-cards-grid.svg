    <text x="24"  y="230" font-size="22" font-weight="800" fill="#FFFFFF">2+</text>
    <text x="24"  y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">YEARS</text>
    <text x="118" y="230" font-size="22" font-weight="800" fill="#FFFFFF">8+</text>
    <text x="118" y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">PROJECTS</text>
    <text x="212" y="230" font-size="15" font-weight="800" fill="#F5E36A">PROFICIENT</text>
    <text x="212" y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">MASTERY</text>
