    <text x="24" y="140" font-size="13.5" font-weight="600" fill="#F5E36A">Docker À AWS À Azure</text>
    <text x="24" y="162" font-size="13.5" font-weight="600" fill="#F5E36A">GitHub Actions À GCP</text>
    <line x1="24" y1="196" x2="266" y2="196" stroke="#F5E36A" stroke-opacity="0.2"/>
    <text x="24"  y="230" font-size="22" font-weight="800" fill="#FFFFFF">2+</text>
    <text x="24"  y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">YEARS</text>
    <text x="118" y="230" font-size="22" font-weight="800" fill="#FFFFFF">8+</text>
    <text x="118" y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">PROJECTS</text>
    <text x="212" y="230" font-size="15" font-weight="800" fill="#F5E36A">PROFICIENT</text>
    <text x="212" y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">MASTERY</text>
    <rect x="24" y="262" width="242" height="3" rx="1.5" fill="#2A2404"/>
    <rect class="pulseBar" x="24" y="262" width="150" height="3" rx="1.5" fill="#F5E36A"/>
  </g>

  <!-- Card 6 À Competitive Programming -->
  <g class="card c5" transform="translate(680,350)">
    <rect width="290" height="290" rx="14" fill="url(#cardBg)" stroke="url(#goldEdge)" stroke-width="1.6" filter="url(#cardGlow)"/>
    <rect x="0" y="0" width="6" height="290" rx="3" fill="#F5E36A"/>
    <text x="24" y="34" font-size="11" font-weight="700" letter-spacing="2" fill="#F5E36A" opacity="0.75">DSA À CONTESTS À SPEED</text>
    <text x="24" y="70" font-size="20" font-weight="800" fill="#FFFFFF">ö Competitive Prog.</text>
    <text x="24" y="98" font-size="13" fill="#B9B9B9">DSA mastery under contest pressure.</text>
    <text x="24" y="140" font-size="13.5" font-weight="600" fill="#F5E36A">LeetCode À Codeforces</text>
    <text x="24" y="162" font-size="13.5" font-weight="600" fill="#F5E36A">CodeChef À Skillrack</text>
    <line x1="24" y1="196" x2="266" y2="196" stroke="#F5E36A" stroke-opacity="0.2"/>
    <text x="24"  y="230" font-size="22" font-weight="800" fill="#FFFFFF">3+</text>
    <text x="24"  y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">YEARS</text>
    <text x="118" y="230" font-size="22" font-weight="800" fill="#FFFFFF">1000+</text>
    <text x="118" y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">SOLVED</text>
    <text x="212" y="230" font-size="15" font-weight="800" fill="#F5E36A">KNIGHT</text>
    <text x="212" y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">RANK</text>
    <rect x="24" y="262" width="242" height="3" rx="1.5" fill="#2A2404"/>
    <rect class="pulseBar" x="24" y="262" width="242" height="3" rx="1.5" fill="#F5E36A"/>
