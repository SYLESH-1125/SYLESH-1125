<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 660" width="990" height="660" fill="none" role="img" aria-label="Tech domain cards  Full-Stack, AI &amp; Agentic Systems, System Design, Data &amp; Databases, Cloud &amp; DevOps, Competitive Programming">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14110A"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7A5E10"/>
      <stop offset="50%" stop-color="#F5E36A"/>
      <stop offset="100%" stop-color="#7A5E10"/>
    </linearGradient>
    <filter id="cardGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .card{animation:rise 0.6s ease-out both}
    .c0{animation-delay:0s} .c1{animation-delay:.08s} .c2{animation-delay:.16s}
    .c3{animation-delay:.24s} .c4{animation-delay:.32s} .c5{animation-delay:.4s}
    @keyframes rise{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
    .pulseBar{animation:pw 3.2s ease-in-out infinite}
    @keyframes pw{0%,100%{opacity:.55}50%{opacity:1}}
    text{font-family:'Segoe UI',Arial,sans-serif}
  </style>

  <rect x="0" y="0" width="990" height="660" fill="#000000"/>

  <!-- background grid lines -->
  <g stroke="#F5E36A" stroke-opacity="0.05">
    <line x1="0" y1="220" x2="990" y2="220"/>
    <line x1="0" y1="440" x2="990" y2="440"/>
    <line x1="330" y1="0" x2="330" y2="660"/>
    <line x1="660" y1="0" x2="660" y2="660"/>
  </g>

  <!-- PPPPPPPPPPP CARD TEMPLATE (repeated x6 via groups) PPPPPPPPPPP -->

  <!-- Card 1 À Full-Stack & Mobile -->
  <g class="card c0" transform="translate(20,20)">
    <rect width="290" height="290" rx="14" fill="url(#cardBg)" stroke="url(#goldEdge)" stroke-width="1.6" filter="url(#cardGlow)"/>
    <rect x="0" y="0" width="6" height="290" rx="3" fill="#F5E36A"/>
    <text x="24" y="34" font-size="11" font-weight="700" letter-spacing="2" fill="#F5E36A" opacity="0.75">WEB À MOBILE À UI</text>
    <text x="24" y="70" font-size="24" font-weight="800" fill="#FFFFFF">< Full-Stack &amp; Mobile</text>
    <text x="24" y="98" font-size="13" fill="#B9B9B9">Frontend, backend &amp; cross-platform apps.</text>
    <text x="24" y="140" font-size="13.5" font-weight="600" fill="#F5E36A">Flutter À Next.js</text>
    <text x="24" y="162" font-size="13.5" font-weight="600" fill="#F5E36A">Node.js À Firebase</text>
    <line x1="24" y1="196" x2="266" y2="196" stroke="#F5E36A" stroke-opacity="0.2"/>
    <text x="24"  y="230" font-size="22" font-weight="800" fill="#FFFFFF">3+</text>
    <text x="24"  y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">YEARS</text>
    <text x="118" y="230" font-size="22" font-weight="800" fill="#FFFFFF">15+</text>
    <text x="118" y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">PROJECTS</text>
    <text x="212" y="230" font-size="15" font-weight="800" fill="#F5E36A">ADVANCED</text>
    <text x="212" y="252" font-size="10" letter-spacing="1" fill="#8A8A8A">MASTERY</text>
    <rect x="24" y="262" width="242" height="3" rx="1.5" fill="#2A2404"/>
    <rect class="pulseBar" x="24" y="262" width="200" height="3" rx="1.5" fill="#F5E36A"/>
  </g>

  <!-- Card 2 À AI & Agentic Systems -->
