<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="GitHub @SYLESH-1125 — color-pulsing brand identifier">
  <defs>
    <!-- SMIL-driven base halo + ring; CSS-driven color cycle on top.
         Each color frame = one banner gradient stop:
           red  #D4AF37  →  orange  #E8A33D  →  purple  #D4AF37  →  red. -->
    <radialGradient id="ghGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D4AF37" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#D4AF37" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ghDisc" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#EAB05C"/>
      <stop offset="100%" stop-color="#E8A33D"/>
    </radialGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      /* Brand-color cycle — matches the capsule-render banner palette
         (red → orange → purple → red). 6s loop. */
      @keyframes haloHueCycle {
        0%   { fill: #D4AF37; }
        33%  { fill: #E8A33D; }
        66%  { fill: #D4AF37; }
        100% { fill: #D4AF37; }
      }
      @keyframes ringStrokeCycle {
        0%   { stroke: #D4AF37; }
        33%  { stroke: #E8A33D; }
        66%  { stroke: #D4AF37; }
        100% { stroke: #D4AF37; }
      }
      @keyframes discFillCycle {
        0%   { fill: #E8A33D; }
        33%  { fill: #F0C98A; }
        66%  { fill: #EAD9A0; }
        100% { fill: #E8A33D; }
      }
      @keyframes haloPulse {
        0%, 100% { opacity: 0.45; transform: scale(0.92); }
        50%      { opacity: 1;    transform: scale(1.12); }
      }
      .halo-blob {
        animation: haloHueCycle 6s ease-in-out infinite,
                   haloPulse 2.6s ease-in-out infinite;
        transform-origin: 48px 48px;
        transform-box: fill-box;
      }
      .halo-ring {
        animation: ringStrokeCycle 6s ease-in-out infinite;
      }
      .accent-disc {
        animation: discFillCycle 6s ease-in-out infinite;
      }
    ]]></style>
  </defs>

  <!-- Color-cycling halo blob (large, breathing) -->
  <circle class="halo-blob" cx="48" cy="48" r="38" fill="#D4AF37" filter="url(#bloom)" opacity="0.55"/>

  <!-- Color-cycling ring around the disc -->
  <circle class="halo-ring" cx="48" cy="48" r="34" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.85"/>

  <!-- Color-cycling accent disc (the orange under the Octocat) -->
  <circle class="accent-disc" cx="48" cy="48" r="28" fill="#E8A33D"/>

  <!-- Octocat — fixed-color, sits crisply on the cycling disc -->
  <g transform="translate(32,32) scale(2)">
    <path fill="#0A0A0B" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
  </g>
</svg>
