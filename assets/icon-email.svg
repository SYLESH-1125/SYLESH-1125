  <circle cx="60" cy="60" r="56" fill="url(#badgeBg2)"/>
  <circle class="ring" cx="60" cy="60" r="54" fill="none" stroke="url(#ring2)" stroke-width="2.2"/>
  <rect x="34" y="42" width="52" height="36" rx="4" fill="none" stroke="#D4AF37" stroke-width="3"/>
