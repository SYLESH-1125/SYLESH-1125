<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none" role="img" aria-label="Email contact icon badge, luxury gold on black">
  <defs>
    <radialGradient id="badgeBg2" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1C1C1F"/>
      <stop offset="100%" stop-color="#0D0D0E"/>
    </radialGradient>
    <linearGradient id="ring2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E6C4"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8A6A28"/>
    </linearGradient>
  </defs>
  <style>
    .ring{animation:sp 4s ease-in-out infinite}
