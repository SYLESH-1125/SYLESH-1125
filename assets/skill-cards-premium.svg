<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 640" width="990" height="640" fill="none" role="img" aria-label="Six premium skill cards: Backend, Frontend, AI and Machine Learning, Cloud and DevOps, Databases, Programming Languages">
