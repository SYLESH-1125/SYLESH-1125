    <text x="24" y="118" font-size="22" font-weight="800" fill="#F2F1EC">Backend</text>
    <text x="24" y="142" font-size="12" fill="#8A8A8F">Robust, well-tested server systems.</text>
    <text x="24" y="176" font-size="13" font-weight="600" fill="#D4AF37">Node.js &#183; Express &#183; Django</text>
    <text x="24" y="198" font-size="13" font-weight="600" fill="#D4AF37">FastAPI &#183; Flask &#183; GraphQL</text>
    <line x1="24" y1="220" x2="286" y2="220" stroke="#D4AF37" stroke-opacity="0.15"/>
    <text x="24"  y="252" font-size="21" font-weight="800" fill="#F2F1EC">3+</text>
    <text x="24"  y="268" font-size="9.5" letter-spacing="1" fill="#6E6E73">YEARS</text>
    <text x="112" y="252" font-size="21" font-weight="800" fill="#F2F1EC">10+</text>
    <text x="112" y="268" font-size="9.5" letter-spacing="1" fill="#6E6E73">PROJECTS</text>
