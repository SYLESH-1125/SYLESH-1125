<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" fill="none" role="img" aria-label="Original skill network map connecting AI, Cloud, Backend, Frontend, Programming, Competitive Programming, Data, Architecture, and Mobile around a central hub">
  <defs>
    <radialGradient id="naHub" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#F3E6C4"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#17171A"/>
    </radialGradient>
    <filter id="naGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    text{font-family:'Segoe UI',Arial,sans-serif}
    .node{animation:breathe 4.5s ease-in-out infinite}
    .d0{animation-delay:0s}.d1{animation-delay:.3s}.d2{animation-delay:.6s}.d3{animation-delay:.9s}
    .d4{animation-delay:1.2s}.d5{animation-delay:1.5s}.d6{animation-delay:1.8s}.d7{animation-delay:2.1s}
    @keyframes breathe{0%,100%{opacity:.8}50%{opacity:1}}
  </style>

  <rect width="900" height="620" fill="#0A0A0B"/>
  <text x="450" y="36" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="3" fill="#8A8A8F">SKILL NETWORK &#183; V1</text>
  <text x="450" y="62" text-anchor="middle" font-size="22" font-weight="800" fill="#F2F1EC">How My Technical Mind Connects</text>

  <g stroke="#D4AF37" stroke-opacity="0.28" stroke-width="1.3" stroke-dasharray="4 5">
    <line x1="450" y1="360" x2="450" y2="160"/>
    <line x1="450" y1="360" x2="640" y2="220"/>
    <line x1="450" y1="360" x2="700" y2="360"/>
    <line x1="450" y1="360" x2="640" y2="500"/>
    <line x1="450" y1="360" x2="450" y2="560"/>
    <line x1="450" y1="360" x2="260" y2="500"/>
    <line x1="450" y1="360" x2="200" y2="360"/>
    <line x1="450" y1="360" x2="260" y2="220"/>
  </g>
  <g stroke="#D4AF37" stroke-opacity="0.12" stroke-width="1">
    <line x1="450" y1="160" x2="640" y2="220"/>
    <line x1="640" y1="220" x2="700" y2="360"/>
    <line x1="700" y1="360" x2="640" y2="500"/>
    <line x1="640" y1="500" x2="450" y2="560"/>
    <line x1="450" y1="560" x2="260" y2="500"/>
    <line x1="260" y1="500" x2="200" y2="360"/>
    <line x1="200" y1="360" x2="260" y2="220"/>
    <line x1="260" y1="220" x2="450" y2="160"/>
  </g>

  <circle cx="450" cy="360" r="52" fill="url(#naHub)" filter="url(#naGlow)"/>
  <text x="450" y="368" text-anchor="middle" font-size="24" font-weight="800" fill="#141210">SP</text>

  <g class="node d0" transform="translate(450,160)">
    <rect x="-58" y="-26" width="116" height="52" rx="14" fill="#141416" stroke="#D4AF37" stroke-width="1.3" filter="url(#naGlow)"/>
    <text x="0" y="-4" text-anchor="middle" font-size="14" font-weight="800" fill="#F2F1EC">AI</text>
    <text x="0" y="14" text-anchor="middle" font-size="9.5" fill="#8A8A8F">LLMs &#183; RAG &#183; Agents</text>
  </g>
  <g class="node d1" transform="translate(640,220)">
    <rect x="-58" y="-26" width="116" height="52" rx="14" fill="#141416" stroke="#D4AF37" stroke-width="1.3" filter="url(#naGlow)"/>
    <text x="0" y="-4" text-anchor="middle" font-size="14" font-weight="800" fill="#F2F1EC">Cloud</text>
    <text x="0" y="14" text-anchor="middle" font-size="9.5" fill="#8A8A8F">AWS &#183; Docker &#183; CI/CD</text>
  </g>
  <g class="node d2" transform="translate(700,360)">
    <rect x="-64" y="-26" width="128" height="52" rx="14" fill="#141416" stroke="#D4AF37" stroke-width="1.3" filter="url(#naGlow)"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13.5" font-weight="800" fill="#F2F1EC">Architecture</text>
    <text x="0" y="14" text-anchor="middle" font-size="9.5" fill="#8A8A8F">Microservices &#183; HLD/LLD</text>
  </g>
  <g class="node d3" transform="translate(640,500)">
    <rect x="-58" y="-26" width="116" height="52" rx="14" fill="#141416" stroke="#D4AF37" stroke-width="1.3" filter="url(#naGlow)"/>
    <text x="0" y="-4" text-anchor="middle" font-size="14" font-weight="800" fill="#F2F1EC">Data</text>
    <text x="0" y="14" text-anchor="middle" font-size="9.5" fill="#8A8A8F">Postgres &#183; Mongo &#183; Redis</text>
  </g>
  <g class="node d4" transform="translate(450,560)">
    <rect x="-58" y="-26" width="116" height="52" rx="14" fill="#141416" stroke="#D4AF37" stroke-width="1.3" filter="url(#naGlow)"/>
    <text x="0" y="-4" text-anchor="middle" font-size="14" font-weight="800" fill="#F2F1EC">Mobile</text>
    <text x="0" y="14" text-anchor="middle" font-size="9.5" fill="#8A8A8F">Flutter &#183; Cross-platform</text>
  </g>
  <g class="node d5" transform="translate(260,500)">
    <rect x="-70" y="-26" width="140" height="52" rx="14" fill="#141416" stroke="#D4AF37" stroke-width="1.3" filter="url(#naGlow)"/>
    <text x="0" y="-4" text-anchor="middle" font-size="12.5" font-weight="800" fill="#F2F1EC">Competitive Prog.</text>
    <text x="0" y="14" text-anchor="middle" font-size="9.5" fill="#8A8A8F">LeetCode Knight &#183; 1000+</text>
  </g>
  <g class="node d6" transform="translate(200,360)">
    <rect x="-64" y="-26" width="128" height="52" rx="14" fill="#141416" stroke="#D4AF37" stroke-width="1.3" filter="url(#naGlow)"/>
    <text x="0" y="-4" text-anchor="middle" font-size="14" font-weight="800" fill="#F2F1EC">Programming</text>
    <text x="0" y="14" text-anchor="middle" font-size="9.5" fill="#8A8A8F">Python &#183; Java &#183; C++</text>
  </g>
  <g class="node d7" transform="translate(260,220)">
    <rect x="-58" y="-26" width="116" height="52" rx="14" fill="#141416" stroke="#D4AF37" stroke-width="1.3" filter="url(#naGlow)"/>
    <text x="0" y="-4" text-anchor="middle" font-size="14" font-weight="800" fill="#F2F1EC">Frontend</text>
    <text x="0" y="14" text-anchor="middle" font-size="9.5" fill="#8A8A8F">React &#183; Next.js</text>
  </g>

  <text x="450" y="410" text-anchor="middle" font-size="9" fill="#6E6E73">Backend woven through every node</text>
</svg>
