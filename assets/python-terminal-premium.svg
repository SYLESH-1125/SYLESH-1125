      <stop offset="0%" stop-color="#17171A"/><stop offset="100%" stop-color="#0D0D0E"/>
    </linearGradient>
    <filter id="ptShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
