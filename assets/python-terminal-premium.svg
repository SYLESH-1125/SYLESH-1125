<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" width="900" height="430" fill="none" role="img" aria-label="Animated Python bio terminal">
  <defs>
    <linearGradient id="ptBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17171A"/><stop offset="100%" stop-color="#0D0D0E"/>
    </linearGradient>
    <filter id="ptShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <clipPath id="terminalBody">
      <rect x="1" y="40" width="898" height="318" rx="0"/>
    </clipPath>
  </defs>
  <style>
    text{font-family:'Cascadia Code','Consolas',monospace}
    .cursor{opacity:0;animation:cursorShow 14s linear infinite,blink 1s steps(1) infinite}
    @keyframes cursorShow{0%,89%{opacity:0}90%,100%{opacity:1}}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    .r1{animation:rv1 14s linear infinite}.r2{animation:rv2 14s linear infinite}
    .r3{animation:rv3 14s linear infinite}.r4{animation:rv4 14s linear infinite}
    .r5{animation:rv5 14s linear infinite}.r6{animation:rv6 14s linear infinite}
    .r7{animation:rv7 14s linear infinite}.r8{animation:rv8 14s linear infinite}
    .r9{animation:rv9 14s linear infinite}.r10{animation:rv10 14s linear infinite}
    .r11{animation:rv11 14s linear infinite}
    @keyframes rv1{0%,2%{width:0}6%,86%{width:260px}100%{width:0}}
    @keyframes rv2{0%,8%{width:0}12%,86%{width:500px}100%{width:0}}
    @keyframes rv3{0%,16%{width:0}20%,86%{width:460px}100%{width:0}}
    @keyframes rv4{0%,24%{width:0}28%,86%{width:480px}100%{width:0}}
    @keyframes rv5{0%,32%{width:0}36%,86%{width:460px}100%{width:0}}
    @keyframes rv6{0%,40%{width:0}44%,86%{width:480px}100%{width:0}}
    @keyframes rv7{0%,48%{width:0}52%,86%{width:460px}100%{width:0}}
    @keyframes rv8{0%,56%{width:0}60%,86%{width:280px}100%{width:0}}
    @keyframes rv9{0%,64%{width:0}68%,86%{width:520px}100%{width:0}}
    @keyframes rv10{0%,72%{width:0}76%,86%{width:500px}100%{width:0}}
    @keyframes rv11{0%,80%{width:0}84%,100%{width:480px}100%{width:0}}
  </style>
  <!-- Terminal window -->
  <rect width="900" height="358" rx="18" fill="url(#ptBg)" stroke="#2A2410" stroke-width="1.2" filter="url(#ptShadow)"/>
  <rect x="0" y="0" width="900" height="40" rx="18" fill="#141210"/>
  <rect x="0" y="20" width="900" height="20" fill="#141210"/>
  <circle cx="28" cy="20" r="6" fill="#E8734A"/><circle cx="50" cy="20" r="6" fill="#E8C34A"/><circle cx="72" cy="20" r="6" fill="#6EA36E"/>
  <text x="450" y="25" text-anchor="middle" font-size="12.5" fill="#8A8A8F">python3 &#8212; bio.py</text>
  <g clip-path="url(#terminalBody)" font-size="15" fill="#F2F1EC">
    <text x="30" y="68"><tspan fill="#8A8A8F">$</tspan> python bio.py</text>
    <g clip-path="url(#c1)"><text x="30" y="94"><tspan fill="#E8A33D">class</tspan> <tspan fill="#D4AF37">SyleshPavendan</tspan>:</text></g>
    <g clip-path="url(#c2)"><text x="30" y="118">    role = <tspan fill="#8FD19E">"Agentic AI Developer / Full-Stack Engineer"</tspan></text></g>
    <g clip-path="url(#c3)"><text x="30" y="142">    education = <tspan fill="#8FD19E">"B.E. CSE @ CIT, CGPA 9.1/10"</tspan></text></g>
    <g clip-path="url(#c4)"><text x="30" y="166">    currently = <tspan fill="#8FD19E">"Agentic AI &amp; Cloud @ Cognizant"</tspan></text></g>
    <g clip-path="url(#c5)"><text x="30" y="190">    team = <tspan fill="#8FD19E">"Team DYNAMITE Lead · 30+ finals · 6 wins"</tspan></text></g>
    <g clip-path="url(#c6)"><text x="30" y="214">    leetcode = <tspan fill="#8FD19E">"Knight · 1000+ solved · Top 4.39%"</tspan></text></g>
    <g clip-path="url(#c7)"><text x="30" y="238">    wins = <tspan fill="#8FD19E">"3x Winner · MOSPI &#8377;1L · CSIC &#8377;50K"</tspan></text></g>
    <g clip-path="url(#c8)"><text x="30" y="266">    <tspan fill="#E8A33D">def</tspan> <tspan fill="#D4AF37">__init__</tspan>(self):</text></g>
    <g clip-path="url(#c9)"><text x="30" y="290">        self.motto = <tspan fill="#8FD19E">"Trial. Error. Fail. Bounce back. Win."</tspan></text></g>
    <g clip-path="url(#c10)"><text x="30" y="314">    <tspan fill="#E8A33D">def</tspan> <tspan fill="#D4AF37">philosophy</tspan>(self): <tspan fill="#E8A33D">return</tspan> self.motto</text></g>
    <g clip-path="url(#c11)"><text x="30" y="338"><tspan fill="#8A8A8F">&gt;&gt;&gt;</tspan> print(SyleshPavendan().philosophy())</text></g>
    <rect class="cursor" x="30" y="324" width="9" height="16" fill="#D4AF37"/>
  </g>
  <!-- Motto always visible — outside terminal box -->
  <text x="30" y="400" font-family="'Cascadia Code','Consolas',monospace" font-size="15" font-weight="700" fill="#D4AF37">Trial. Error. Fail. Bounce back. Win.</text>
  <clipPath id="c1"><rect class="r1" x="30" y="78" width="0" height="20"/></clipPath>
  <clipPath id="c2"><rect class="r2" x="30" y="102" width="0" height="20"/></clipPath>
  <clipPath id="c3"><rect class="r3" x="30" y="126" width="0" height="20"/></clipPath>
  <clipPath id="c4"><rect class="r4" x="30" y="150" width="0" height="20"/></clipPath>
  <clipPath id="c5"><rect class="r5" x="30" y="174" width="0" height="20"/></clipPath>
  <clipPath id="c6"><rect class="r6" x="30" y="198" width="0" height="20"/></clipPath>
  <clipPath id="c7"><rect class="r7" x="30" y="222" width="0" height="20"/></clipPath>
  <clipPath id="c8"><rect class="r8" x="30" y="250" width="0" height="20"/></clipPath>
  <clipPath id="c9"><rect class="r9" x="30" y="274" width="0" height="20"/></clipPath>
  <clipPath id="c10"><rect class="r10" x="30" y="298" width="0" height="20"/></clipPath>
  <clipPath id="c11"><rect class="r11" x="30" y="322" width="0" height="20"/></clipPath>
</svg>
