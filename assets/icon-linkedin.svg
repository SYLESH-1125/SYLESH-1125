<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none" role="img" aria-label="LinkedIn profile icon badge, luxury gold on black">
  <defs>
    <radialGradient id="badgeBg" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1C1C1F"/>
      <stop offset="100%" stop-color="#0D0D0E"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3E6C4"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8A6A28"/>
    </linearGradient>
  </defs>
  <style>
    text{font-family:'Segoe UI',Arial,sans-serif}
    .ring{animation:sp 4s ease-in-out infinite}
    @keyframes sp{0%,100%{opacity:.75}50%{opacity:1}}
  </style>
  <circle cx="60" cy="60" r="56" fill="url(#badgeBg)"/>
  <circle class="ring" cx="60" cy="60" r="54" fill="none" stroke="url(#ring)" stroke-width="2.2"/>
  <text x="60" y="72" text-anchor="middle" font-size="34" font-weight="800" fill="#D4AF37">in</text>
</svg>
