    <text x="18" y="134" font-size="11.5" fill="#C9C9C9">  &amp; DSA fundamentals</text>
    <text x="18" y="156" font-size="11.5" fill="#C9C9C9">" Started competitive</text>
    <text x="18" y="178" font-size="11.5" fill="#C9C9C9">  programming journey</text>
