      <stop offset="0%" stop-color="#14110A"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="yhEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7A5E10"/>
      <stop offset="50%" stop-color="#F5E36A"/>
      <stop offset="100%" stop-color="#7A5E10"/>
    </linearGradient>
    <filter id="yhGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
