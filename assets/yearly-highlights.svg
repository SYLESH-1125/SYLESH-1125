    .card{animation:rise .6s ease-out both}
    .y0{animation-delay:0s}.y1{animation-delay:.1s}.y2{animation-delay:.2s}.y3{animation-delay:.3s}.y4{animation-delay:.4s}
    @keyframes rise{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
  </style>

  <rect x="0" y="0" width="1180" height="460" fill="#000000"/>

  <text x="590" y="34" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="3" fill="#F5E36A" opacity="0.8">CAREER TIMELINE · 2022  2026</text>
  <text x="590" y="62" text-anchor="middle" font-size="26" font-weight="800" fill="#FFFFFF">=€ Yearly Journey</text>

